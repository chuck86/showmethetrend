<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategic Topic Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── DESIGN TOKENS ─────────────────────────────────────────────────────── */
  :root {
    --black:   #000000;
    --white:   #ffffff;
    --navy:    #040066;
    --navy-mid:#0a009f;
    --cyan:    #00d4ff;
    --cyan-dim: rgba(0,212,255,0.15);

    --pink:    #ffa6b4;
    --lavender:#d3beec;
    --yellow:  #ffeda3;
    --peach:   #ffc390;
    --mint:    #c4ebc3;

    --bg:      #f4f6fb;
    --surface: #ffffff;
    --surface-2: #eef1f8;

    --text:    #000000;
    --text-mid:#1a1a3a;
    --muted:   #6b6b8a;

    --border:  rgba(4,0,102,0.1);
    --border-strong: rgba(4,0,102,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 0% 0%, rgba(0,212,255,0.06) 0%, transparent 55%),
      radial-gradient(ellipse 50% 70% at 100% 100%, rgba(4,0,102,0.05) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ──────────────────────────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 200;
    background: var(--navy);
    height: 68px;
    display: flex; align-items: stretch;
    box-shadow: 0 2px 24px rgba(4,0,102,0.25);
  }

  .header-logo {
    display: flex; align-items: center;
    padding: 0 2rem;
    border-right: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
    text-decoration: none;
    gap: 0.85rem;
    min-width: 220px;
  }

  /* ↓ Replace this div with <img src="logo.svg"> when you have a logo */

  .logo-placeholder {
    width: 38px; height: 38px;
    border: 2px dashed rgba(0,212,255,0.45);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative;
  }
  .logo-placeholder::after {
    content: 'LOGO';
    font-family: 'DM Mono', monospace; font-size: 0.45rem;
    letter-spacing: 0.1em; color: rgba(0,212,255,0.55);
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  }

  .logo-text { display: flex; flex-direction: column; gap: 1px; }
  .logo-name { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.02em; color: var(--white); line-height: 1.1; }
  .logo-tagline { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em; color: var(--cyan); text-transform: uppercase; opacity: 0.8; }

  nav { display: flex; align-items: stretch; flex: 1; padding: 0 0.5rem; }

  .nav-link {
    display: flex; align-items: center;
    padding: 0 1.25rem;
    font-size: 0.8rem; font-weight: 500; letter-spacing: 0.04em;
    color: rgba(255,255,255,0.6); text-decoration: none;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap; cursor: pointer;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'Syne', sans-serif;
  }
  .nav-link:hover { color: var(--white); border-bottom-color: rgba(0,212,255,0.35); }
  .nav-link.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  .nav-badge {
    font-family: 'DM Mono', monospace; font-size: 0.48rem; letter-spacing: 0.08em;
    background: rgba(0,212,255,0.12); color: var(--cyan);
    border: 1px dashed rgba(0,212,255,0.3);
    padding: 0.1rem 0.35rem; border-radius: 2px;
    margin-left: 0.45rem; text-transform: uppercase;
  }

  .header-right {
    display: flex; align-items: center; gap: 1rem;
    padding: 0 1.5rem;
    border-left: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .header-count { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.08em; color: rgba(255,255,255,0.35); text-transform: uppercase; }
  .git-link { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.05em; color: rgba(255,255,255,0.5); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; border: 1px solid rgba(255,255,255,0.15); padding: 0.35rem 0.8rem; border-radius: 3px; transition: all 0.18s; white-space: nowrap; }
  .git-link:hover { color: var(--cyan); border-color: rgba(0,212,255,0.4); }
  .git-link svg { width: 12px; height: 12px; }

  /* ── LOADING ─────────────────────────────────────────────────────────────── */
  .state-msg { display: flex; align-items: center; justify-content: center; min-height: 40vh; flex-direction: column; gap: 1rem; font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); letter-spacing: 0.06em; }
  .spinner { width: 26px; height: 26px; border: 2px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.65s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── VIEWS ───────────────────────────────────────────────────────────────── */
  #view-index, #view-detail { position: relative; z-index: 1; }
  #view-detail { display: none; }

  /* ── HERO ────────────────────────────────────────────────────────────────── */
  .index-hero { padding: 4.5rem 3rem 2.5rem; max-width: 1280px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 2rem; flex-wrap: wrap; }

  .hero-text h1 { font-size: clamp(2.2rem, 4.5vw, 3.6rem); font-weight: 800; line-height: 1.05; color: var(--navy); max-width: 560px; margin-bottom: 0.9rem; letter-spacing: -0.025em; }
  .hero-text h1 span { color: var(--cyan); position: relative; }
  .hero-text h1 span::after { content: ''; position: absolute; left: 0; bottom: 3px; right: 0; height: 3px; background: var(--cyan); opacity: 0.25; }
  .index-subtitle { color: var(--muted); font-size: 0.92rem; max-width: 440px; line-height: 1.65; font-weight: 400; }

  .search-wrap { position: relative; }
  .search-input { font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.03em; padding: 0.65rem 1.1rem 0.65rem 2.4rem; border: 1.5px solid var(--border-strong); border-radius: 4px; background: var(--white); color: var(--text); width: 220px; transition: border-color 0.2s, box-shadow 0.2s, width 0.3s; outline: none; }
  .search-input:focus { border-color: var(--cyan); width: 270px; box-shadow: 0 0 0 3px rgba(0,212,255,0.12); }
  .search-input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

  /* ── FILTER BAR ──────────────────────────────────────────────────────────── */
  .filter-section { max-width: 1280px; margin: 0 auto; padding: 0 3rem 2rem; border-bottom: 1px solid var(--border); }
  .filter-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.65rem; }
  .filter-bar { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .filter-btn { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.4rem 0.9rem; border: 1.5px solid var(--border-strong); background: var(--surface); color: var(--muted); border-radius: 3px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .filter-btn:hover { border-color: var(--navy); color: var(--navy); }
  .filter-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

  /* ── GRID ────────────────────────────────────────────────────────────────── */
  .topics-grid { max-width: 1280px; margin: 0 auto; padding: 2.5rem 3rem 5rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1px; background: var(--border); }

  /* ── CARD ────────────────────────────────────────────────────────────────── */
  .topic-card { background: var(--surface); padding: 1.75rem 2rem; cursor: pointer; position: relative; overflow: hidden; transition: background 0.18s; animation: fadeUp 0.35s ease forwards; opacity: 0; }
  .topic-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--card-accent, var(--cyan)); opacity: 0; transition: opacity 0.2s; }
  .topic-card:hover { background: var(--surface-2); }
  .topic-card:hover::before { opacity: 1; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.85rem; }
  .card-score { text-align: right; flex-shrink: 0; }
  .score-num { font-size: 2rem; font-weight: 800; line-height: 1; color: var(--navy); }
  .score-denom { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); }
  .score-bar { width: 44px; height: 3px; background: var(--surface-2); margin-top: 5px; border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--navy), var(--cyan)); }
  .card-title { font-size: 1.15rem; font-weight: 700; line-height: 1.25; flex: 1; padding-right: 1rem; letter-spacing: -0.01em; }
  .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; margin-bottom: 1.25rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-weight: 400; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 1rem; }

  .tag { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 2px; font-weight: 500; border: 1px solid transparent; }
  .tag-payment    { background: rgba(0,212,255,0.1);    color: #005f7a; border-color: rgba(0,212,255,0.3); }
  .tag-research   { background: rgba(211,190,236,0.3);  color: #4a2d7a; border-color: rgba(211,190,236,0.7); }
  .tag-creditcard { background: rgba(255,166,180,0.25); color: #7a1525; border-color: rgba(255,166,180,0.6); }
  .tag-regulation { background: rgba(255,195,144,0.3);  color: #7a3500; border-color: rgba(255,195,144,0.7); }
  .tag-blockchain { background: rgba(196,235,195,0.35); color: #1a5219; border-color: rgba(196,235,195,0.8); }
  .tag-infra      { background: rgba(255,237,163,0.4);  color: #665500; border-color: rgba(255,237,163,0.9); }
  .tag-digipay    { background: rgba(0,212,255,0.13);   color: #004f66; border-color: rgba(0,212,255,0.35); }
  .tag-trusted    { background: rgba(211,190,236,0.35); color: #3d2070; border-color: rgba(211,190,236,0.75); }
  .tag-bankreg    { background: rgba(255,195,144,0.35); color: #6a2e00; border-color: rgba(255,195,144,0.75); }
  .tag-trends     { background: rgba(255,237,163,0.45); color: #5a4a00; border-color: rgba(255,237,163,0.95); }
  .tag-itsec      { background: rgba(255,166,180,0.28); color: #6a1020; border-color: rgba(255,166,180,0.65); }
  .tag-market     { background: rgba(196,235,195,0.4);  color: #174a16; border-color: rgba(196,235,195,0.85); }
  .tag-default    { background: rgba(4,0,102,0.06);     color: var(--navy); border-color: rgba(4,0,102,0.2); }

  .card-stakeholders { display: flex; align-items: center; gap: 0.5rem; font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); }
  .avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--navy); color: var(--white); font-size: 0.52rem; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; border: 2px solid var(--surface); font-weight: 600; }
  .avatar-stack { display: flex; }
  .avatar-stack .avatar { margin-left: -7px; }
  .avatar-stack .avatar:first-child { margin-left: 0; }
  .no-results { grid-column: 1/-1; padding: 4rem; text-align: center; font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); letter-spacing: 0.06em; background: var(--surface); }

  /* ── DETAIL ──────────────────────────────────────────────────────────────── */
  .detail-topbar { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 68px; z-index: 50; }
  .detail-nav { max-width: 1280px; margin: 0 auto; padding: 0 3rem; display: flex; align-items: center; justify-content: space-between; height: 52px; }
  .back-btn { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); cursor: pointer; background: none; border: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.15s; font-weight: 500; }
  .back-btn:hover { color: var(--navy); }
  .back-btn svg { width: 14px; height: 14px; }
  .detail-breadcrumb { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.05em; display: flex; align-items: center; gap: 0.5rem; }
  .breadcrumb-sep { opacity: 0.4; }
  .breadcrumb-current { color: var(--navy); font-weight: 600; }

  .detail-layout { max-width: 1280px; margin: 0 auto; padding: 3rem; display: grid; grid-template-columns: 1fr 300px; gap: 4rem; }

  .score-band { background: var(--navy); color: var(--white); padding: 1.5rem 2rem; display: flex; align-items: center; gap: 2rem; margin-bottom: 2.5rem; }
  .score-band-num { font-size: 4.5rem; font-weight: 800; line-height: 1; color: var(--cyan); }
  .score-band-right { flex: 1; }
  .score-band-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.5; margin-bottom: 0.5rem; }
  .score-band-bar { height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; max-width: 200px; }
  .score-band-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), rgba(0,212,255,0.35)); border-radius: 3px; }

  .detail-category { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cyan); margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem; }
  .detail-category::before { content: ''; display: block; width: 18px; height: 2px; background: var(--cyan); }
  .detail-title { font-size: clamp(1.9rem, 3.5vw, 2.8rem); font-weight: 800; line-height: 1.08; margin-bottom: 1.25rem; letter-spacing: -0.025em; color: var(--navy); }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 2rem; }

  .section-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.75rem; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-body { font-size: 0.92rem; line-height: 1.72; color: var(--text-mid); margin-bottom: 2.5rem; font-weight: 400; }

  .actions-list { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 2.5rem; }
  .action-item { display: flex; gap: 1rem; align-items: flex-start; padding: 1rem 1.25rem; border: 1px solid var(--border); background: var(--surface); transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s; border-radius: 2px; }
  .action-item:hover { border-color: var(--cyan); transform: translateX(4px); box-shadow: -3px 0 0 var(--cyan); }
  .action-num { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--cyan); font-weight: 600; margin-top: 2px; flex-shrink: 0; }
  .action-text { font-size: 0.86rem; line-height: 1.52; flex: 1; color: var(--text-mid); }
  .action-status { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 2px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; font-weight: 600; }
  .status-open        { background: rgba(255,237,163,0.55); color: #665500; }
  .status-in-progress { background: rgba(0,212,255,0.12);  color: #005f7a; }
  .status-done        { background: rgba(196,235,195,0.55); color: #1a5219; }

  .sidebar-card { border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.25rem; background: var(--surface); border-radius: 2px; }
  .sidebar-card h3 { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.1rem; }
  .stakeholder-item { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.85rem; }
  .stakeholder-item:last-child { margin-bottom: 0; }
  .stakeholder-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--navy); color: var(--white); font-family: 'DM Mono', monospace; font-size: 0.62rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: 600; }
  .stakeholder-name { font-size: 0.85rem; font-weight: 600; display: block; color: var(--text); }
  .stakeholder-role { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); }
  .meta-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
  .meta-row:last-child { border-bottom: none; padding-bottom: 0; }
  .meta-key { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.05em; text-transform: uppercase; }
  .meta-val { font-weight: 600; font-size: 0.82rem; color: var(--navy); }

  .priority-badge { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.06em; font-weight: 600; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 2px; }
  .priority-critical    { background: rgba(255,166,180,0.35); color: #7a1525; }
  .priority-high        { background: rgba(255,195,144,0.4);  color: #7a3500; }
  .priority-medium-high { background: rgba(255,237,163,0.55); color: #665500; }
  .priority-medium      { background: rgba(196,235,195,0.5);  color: #1a5219; }
  .priority-low-medium  { background: rgba(211,190,236,0.35); color: #4a2d7a; }
  .priority-low         { background: rgba(4,0,102,0.06);     color: var(--navy); }

  /* ── ANIMATIONS ──────────────────────────────────────────────────────────── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp 0.35s ease forwards; opacity: 0; }

  /* ── RESPONSIVE ──────────────────────────────────────────────────────────── */
  @media (max-width: 900px) {
    .detail-layout { grid-template-columns: 1fr; gap: 2rem; padding: 1.5rem; }
  }
  @media (max-width: 720px) {
    header { height: auto; flex-wrap: wrap; }
    .header-logo { min-width: unset; padding: 0.75rem 1.25rem; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); width: 100%; }
    nav { overflow-x: auto; padding: 0 0.25rem; -webkit-overflow-scrolling: touch; }
    .nav-link { padding: 0 0.85rem; font-size: 0.75rem; }
    .nav-badge { display: none; }
    .header-right { padding: 0.6rem 1.25rem; border-left: none; border-top: 1px solid rgba(255,255,255,0.08); width: 100%; justify-content: space-between; }
    .index-hero { padding: 2.5rem 1.5rem 1.5rem; }
    .filter-section { padding: 0 1.5rem 1.5rem; }
    .topics-grid { padding: 1.5rem 1.5rem 3rem; grid-template-columns: 1fr; }
    .detail-nav { padding: 0 1.5rem; }
    .detail-topbar { top: 0; }
  }
</style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════════════════════ -->
<header>

  <!-- LOGO — replace .logo-placeholder with your <img> tag when ready -->
  <a class="header-logo" href="#" onclick="showIndex(); return false;">
    <img src="G+D Netcetera Logo White_sRGB_72.png" alt="G+D Netcetera" style="width:303px;height:73px;object-fit:contain;border-radius:4px;">
<div class="logo-placeholder">
     <!--   TO ADD YOUR LOGO: replace the div above with:
      style="width:38px;height:38px;object-fit:contain"> -->
  </div> 
    <!--<div class="logo-text">
      <span class="logo-name" id="site-title">Company Name</span>
      <span class="logo-tagline">Strategic Intelligence</span>
    </div>-->
  </a>

  <!-- NAV LINKS — update href values and remove nav-badge when pages are ready -->
  <nav>
    <button class="nav-link active" onclick="showIndex()">Topics</button>
    <a class="nav-link" href="#">Dashboard <span class="nav-badge">soon</span></a>
    <a class="nav-link" href="#">Stakeholders <span class="nav-badge">soon</span></a>
    <a class="nav-link" href="#">Reports <span class="nav-badge">soon</span></a>
    <a class="nav-link" href="#">Settings <span class="nav-badge">soon</span></a>
  </nav>

  <div class="header-right">
    <span class="header-count" id="header-meta">—</span>
    <a class="git-link" id="github-link" href="#" target="_blank">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      Edit on GitHub
    </a>
  </div>

</header>

<!-- ══ INDEX VIEW ══════════════════════════════════════════════════════════ -->
<div id="view-index">
  <div class="index-hero">
    <div class="hero-text">
      <h1>Strategic Topics<br><span>Under Scrutiny</span></h1>
      <p class="index-subtitle" id="hero-subtitle">A living registry of strategic topics ranked by business importance, with stakeholder ownership and short-term action plans.</p>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="5"/><path d="M11 11l3 3"/></svg>
      <input class="search-input" id="search-input" type="text" placeholder="Search topics…" oninput="applyFilters()">
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-label">Filter by tag</div>
    <div class="filter-bar" id="filter-bar"></div>
  </div>

  <div id="topics-container"></div>
</div>

<!-- ══ DETAIL VIEW ═════════════════════════════════════════════════════════ -->
<div id="view-detail">
  <div class="detail-topbar">
    <div class="detail-nav">
      <button class="back-btn" onclick="showIndex()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 3L5 8l5 5"/></svg>
        All Topics
      </button>
      <div class="detail-breadcrumb">
        <span>Topics</span>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current" id="breadcrumb-title">—</span>
      </div>
    </div>
  </div>
  <div class="detail-layout">
    <div id="detail-main"></div>
    <div id="detail-sidebar"></div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const DATA_URL    = './topics.json';
const GITHUB_REPO = ''; // e.g. 'https://github.com/yourorg/your-repo'

// ── State ───────────────────────────────────────────────────────────────────
let db = null, activeTag = null, searchQuery = '';

// ── Helpers ─────────────────────────────────────────────────────────────────
function tagClass(t) {
  const map = {
    'payment':          'tag-payment',
    'research':         'tag-research',
    'credit card':      'tag-creditcard',
    'regulation':       'tag-regulation',
    'blockchain':       'tag-blockchain',
    'infrastructure':   'tag-infra',
    'digital payments': 'tag-digipay',
    'trusted services': 'tag-trusted',
    'banking regulatory': 'tag-bankreg',
    'trends':           'tag-trends',
    'IT security':      'tag-itsec',
    'market':           'tag-market',
  };
  return map[t] || 'tag-default';
}

const ACCENTS = ['#00d4ff','#ffa6b4','#d3beec','#ffeda3','#ffc390','#c4ebc3'];
const cardAccent = i => ACCENTS[i % ACCENTS.length];

function initials(name) { return name.split(' ').map(n => n[0]).join(''); }

function priorityClass(p) {
  if (!p) return '';
  return 'priority-' + p.toLowerCase().replace(/[\s\/]+/g, '-');
}

function getStakeholders(topic) {
  if (!db) return [];
  return (topic.stakeholders || []).map(ref => {
    if (typeof ref === 'object') return ref;
    return db.stakeholders.find(s => s.id === ref) || { name: String(ref), role: '' };
  });
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('topics-container').innerHTML =
    `<div class="state-msg"><div class="spinner"></div><span>Loading topics…</span></div>`;
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error(`Could not load topics.json (${res.status})`);
    db = await res.json();
    boot();
  } catch(e) {
    document.getElementById('topics-container').innerHTML = `
      <div class="state-msg"><div style="border:1px solid rgba(255,166,180,0.5);background:rgba(255,166,180,0.1);
        color:#7a1525;padding:1.5rem 2rem;font-family:'DM Mono',monospace;font-size:0.75rem;
        max-width:480px;line-height:1.7;">
        <strong>Failed to load topics.json</strong><br><br>${e.message}<br><br>
        Serve locally with: <code>python -m http.server 3000</code>
      </div></div>`;
  }
}

function boot() {
  const meta = db.meta || {};
  document.title = meta.title || 'Strategic Intelligence';
  document.getElementById('site-title').textContent = meta.organisation || 'Company Name';

  const gh = document.getElementById('github-link');
  if (GITHUB_REPO) { gh.href = GITHUB_REPO; } else { gh.style.display = 'none'; }

  const tags = db.tags || [...new Set(db.topics.flatMap(t => t.tags))];
  document.getElementById('filter-bar').innerHTML =
    `<button class="filter-btn active" onclick="setTag(null,this)">All</button>` +
    tags.map(t => `<button class="filter-btn" onclick="setTag('${t}',this)">${t}</button>`).join('');

  renderIndex();
}

// ── Filtering ────────────────────────────────────────────────────────────────
function setTag(tag, btn) {
  activeTag = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderIndex();
}

function applyFilters() {
  searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
  renderIndex();
}

function filteredTopics() {
  return (db.topics || [])
    .filter(t => !activeTag || t.tags.includes(activeTag))
    .filter(t => !searchQuery ||
      t.title.toLowerCase().includes(searchQuery) ||
      (t.description||'').toLowerCase().includes(searchQuery) ||
      t.tags.some(tag => tag.includes(searchQuery)));
}

// ── Render index ─────────────────────────────────────────────────────────────
function renderIndex() {
  const topics = filteredTopics();
  const total  = (db.topics||[]).length;
  document.getElementById('header-meta').textContent = `${topics.length} / ${total} topics`;

  const c = document.getElementById('topics-container');
  if (!topics.length) {
    c.innerHTML = `<div class="topics-grid"><div class="no-results">No topics match your filters.</div></div>`;
    return;
  }
  c.innerHTML = `<div class="topics-grid">${topics.map((t,i) => {
    const s = getStakeholders(t);
    return `
    <div class="topic-card" style="animation-delay:${i*0.05}s;--card-accent:${cardAccent(i)}" onclick="showDetail(${t.id})">
      <div class="card-top">
        <div class="card-title">${t.title}</div>
        <div class="card-score">
          <div class="score-num">${t.score}</div>
          <div class="score-denom">/ 10</div>
          <div class="score-bar"><div class="score-fill" style="width:${t.score*10}%"></div></div>
        </div>
      </div>
      <p class="card-desc">${t.description||''}</p>
      <div class="card-tags">${t.tags.map(tag=>`<span class="tag ${tagClass(tag)}">${tag}</span>`).join('')}</div>
      <div class="card-stakeholders">
        <div class="avatar-stack">${s.map(p=>`<div class="avatar" title="${p.name}">${initials(p.name)}</div>`).join('')}</div>
        <span>${s.map(p=>p.name.split(' ')[0]).join(', ')||'—'}</span>
      </div>
    </div>`; }).join('')}</div>`;
}

// ── Render detail ─────────────────────────────────────────────────────────────
function showDetail(id) {
  const t = db.topics.find(x => x.id === id);
  if (!t) return;
  document.getElementById('view-index').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  document.getElementById('breadcrumb-title').textContent = t.title;
  window.scrollTo(0,0);
  history.pushState({ topicId: id }, '', `#topic-${id}`);

  const s = getStakeholders(t);

  document.getElementById('detail-main').innerHTML = `
    <div class="fade-up">
      <div class="detail-category">Strategic Topic</div>
      <h1 class="detail-title">${t.title}</h1>
      <div class="detail-tags">${t.tags.map(tag=>`<span class="tag ${tagClass(tag)}">${tag}</span>`).join('')}</div>
      <div class="score-band">
        <div class="score-band-num">${t.score}</div>
        <div class="score-band-right">
          <div class="score-band-label">Importance Score / 10</div>
          <div class="score-band-bar"><div class="score-band-fill" style="width:${t.score*10}%"></div></div>
        </div>
      </div>
    </div>
    <div class="fade-up" style="animation-delay:0.1s">
      <div class="section-label">Description</div>
      <p class="section-body">${t.description||'No description provided.'}</p>
    </div>
    <div class="fade-up" style="animation-delay:0.2s">
      <div class="section-label">Short-Term Actions</div>
      <div class="actions-list">
        ${t.actions&&t.actions.length
          ? t.actions.map((a,i)=>{
              const status=a.status||'open', text=typeof a==='string'?a:a.description;
              return `<div class="action-item">
                <span class="action-num">0${i+1}</span>
                <span class="action-text">${text}</span>
                <span class="action-status status-${status.replace(' ','-')}">${status}</span>
              </div>`;}).join('')
          : '<p style="color:var(--muted);font-size:0.85rem">No actions recorded.</p>'}
      </div>
    </div>`;

  document.getElementById('detail-sidebar').innerHTML = `
    <div class="sidebar-card fade-up" style="animation-delay:0.12s">
      <h3>Stakeholders</h3>
      ${s.length ? s.map(p=>`
        <div class="stakeholder-item">
          <div class="stakeholder-avatar">${initials(p.name)}</div>
          <div><span class="stakeholder-name">${p.name}</span><span class="stakeholder-role">${p.role||''}</span></div>
        </div>`).join('')
        : '<p style="color:var(--muted);font-size:0.82rem">No stakeholders assigned.</p>'}
    </div>
    <div class="sidebar-card fade-up" style="animation-delay:0.22s">
      <h3>Metadata</h3>
      <div class="meta-row"><span class="meta-key">Priority</span><span class="priority-badge ${priorityClass(t.priority)}">${t.priority||'—'}</span></div>
      <div class="meta-row"><span class="meta-key">Time Horizon</span><span class="meta-val">${t.horizon||'—'}</span></div>
      <div class="meta-row"><span class="meta-key">Last Updated</span><span class="meta-val">${t.updated_at||db.meta?.updated||'—'}</span></div>
      <div class="meta-row"><span class="meta-key">Actions</span><span class="meta-val">${(t.actions||[]).length} items</span></div>
      <div class="meta-row"><span class="meta-key">Score</span><span class="meta-val">${t.score} / 10</span></div>
    </div>`;
}

function showIndex() {
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-index').style.display = 'block';
  document.querySelectorAll('.nav-link').forEach((l,i) => l.classList.toggle('active', i===0));
  history.pushState({}, '', window.location.pathname);
  window.scrollTo(0,0);
}

window.addEventListener('popstate', e => {
  if (e.state?.topicId) showDetail(e.state.topicId);
  else showIndex();
});

function checkHash() {
  const m = window.location.hash.match(/^#topic-(\d+)$/);
  if (m && db) showDetail(parseInt(m[1]));
}

loadData().then(checkHash);
</script>
</body>
</html>
