<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategic Topic Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0f0f13;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
      padding: 2rem;
      gap: 2rem;
    }
    h1 { font-size: 1.4rem; letter-spacing: 0.2em; text-transform: uppercase; color: #aaa; }
    canvas { background: #1a1a22; border-radius: 50%; }
    .controls { display: flex; gap: 3rem; align-items: center; }
    label { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    .label-text { font-size: 0.75rem; letter-spacing: 0.15em; color: #888; }
    input[type=range] { width: 120px; }
    #n-val   { font-size: 1.5rem; font-weight: bold; color: #e63946; }
    #gap-val { font-size: 1.5rem; font-weight: bold; color: #2a9d8f; }
    #n-slider   { accent-color: #e63946; }
    #gap-slider { accent-color: #2a9d8f; }
  </style>
</head>
<body>
  <h1>Circle Slice Plot</h1>
  <canvas id="c" width="400" height="400"></canvas>
  <div class="controls">
    <label>
      <span class="label-text">SLICES (n)</span>
      <input id="n-slider" type="range" min="2" max="24" value="8" />
      <span id="n-val">8</span>
    </label>
    <label>
      <span class="label-text">GAP (px)</span>
      <input id="gap-slider" type="range" min="0" max="20" value="6" />
      <span id="gap-val">6</span>
    </label>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const nSlider = document.getElementById('n-slider');
    const gapSlider = document.getElementById('gap-slider');
    const nVal = document.getElementById('n-val');
    const gapVal = document.getElementById('gap-val');

    const colors = [
      "#e63946","#f4a261","#2a9d8f","#457b9d",
      "#e9c46a","#a8dadc","#f77f00","#6a4c93",
      "#43aa8b","#277da1","#f94144","#90be6d",
    ];

    function draw() {
      const n   = parseInt(nSlider.value);
      const gap = parseInt(gapSlider.value);
      nVal.textContent   = n;
      gapVal.textContent = gap;

      const W = canvas.width, H = canvas.height;
      const cx = W / 2, cy = H / 2;
      const R  = Math.min(W, H) / 2 - 20;

      ctx.clearRect(0, 0, W, H);

      const sliceAngle = (2 * Math.PI) / n;
      // half the gap distance — each slice edge is offset this far from the boundary line
      const half = gap / 2;

      for (let i = 0; i < n; i++) {
        // The angle of this slice's two boundary radii
        const a1 = i * sliceAngle;       // left boundary angle
        const a2 = (i + 1) * sliceAngle; // right boundary angle

        // Inward-perpendicular directions for each boundary
        // For boundary at angle a, the slice interior is at a + sliceAngle/2.
        // The perpendicular pointing INTO the slice is (a + 90°) for left edge,
        // and (a - 90°) for right edge.
        // Left edge: shift in direction (a1 + π/2) by half
        const lx = Math.cos(a1 + Math.PI / 2) * half;
        const ly = Math.sin(a1 + Math.PI / 2) * half;
        // Right edge: shift in direction (a2 - π/2) by half
        const rx = Math.cos(a2 - Math.PI / 2) * half;
        const ry = Math.sin(a2 - Math.PI / 2) * half;

        // Build the clipped slice as an intersection of:
        //   - the circle
        //   - half-plane to the right of the left edge  (shifted inward by half)
        //   - half-plane to the left of the right edge  (shifted inward by half)
        //
        // Strategy: draw the full arc sector, then use clip to carve off the gap strips.
        ctx.save();

        // Clip region: intersection of two half-planes
        ctx.beginPath();
        // Left half-plane: line through (cx+lx, cy+ly) in direction of a1
        // Points on the correct side satisfy the signed-distance test.
        // We build a large rectangle on the correct side.
        const BIG = R * 3;
        const cos1 = Math.cos(a1), sin1 = Math.sin(a1);
        const cos2 = Math.cos(a2), sin2 = Math.sin(a2);

        // Left clip: keep points where dot((p - pivot1), perp_left) >= 0
        // perp_left points into the slice: (cos(a1+π/2), sin(a1+π/2)) = (-sin1, cos1)
        // pivot1 = (cx + lx, cy + ly)
        // We draw the half-plane as a big quad on the allowed side.
        const p1x = cx + lx, p1y = cy + ly;
        ctx.moveTo(p1x + cos1 * BIG,  p1y + sin1 * BIG);
        ctx.lineTo(p1x - cos1 * BIG,  p1y - sin1 * BIG);
        ctx.lineTo(p1x - cos1 * BIG - sin1 * BIG * (-1),  p1y - sin1 * BIG + cos1 * BIG);
        // build as large polygon covering the right half of the boundary
        ctx.rect(-BIG + p1x - sin1*BIG, -BIG + p1y + cos1*BIG, BIG*4, BIG*4);
        ctx.closePath();

        // Instead of the half-plane approach (complex winding), use a simpler method:
        // translate & rotate so this slice is centred on the x-axis, then clip with two angled lines.
        ctx.restore();

        // ---- Cleaner approach: rotate canvas so slice is symmetric about x-axis ----
        ctx.save();
        ctx.translate(cx, cy);

        const midAngle = a1 + sliceAngle / 2;
        ctx.rotate(midAngle);
        // Now this slice spans from -sliceAngle/2 to +sliceAngle/2 around the x-axis.
        const halfSlice = sliceAngle / 2;

        // Clip path: two half-planes
        // Left edge boundary is at angle -halfSlice from x-axis.
        // Its inward normal points toward +y. Offset = half upward (+y direction when at that angle).
        // After rotation, left boundary angle = -halfSlice, right boundary angle = +halfSlice.
        // Left edge: line through (0,0) rotated -halfSlice, shifted by +half in normal direction (toward +y in slice frame).
        //   In slice frame: left boundary line passes through (0, half) with direction (cos(-halfSlice), sin(-halfSlice)).
        //   We keep points ABOVE this line.
        // Right edge: line passes through (0, -half) with direction (cos(halfSlice), sin(halfSlice)).
        //   We keep points BELOW this line.

        ctx.beginPath();
        // Left edge clip — half-plane: points where y >= half - x*tan(-halfSlice)
        //   i.e. y + x*tan(halfSlice) >= half
        // Right edge clip — half-plane: points where y <= -half + x*tan(halfSlice)
        //   i.e. y - x*tan(halfSlice) <= -half

        // Build clip as intersection using canvas clip with even-odd or nonzero winding.
        // Easiest: draw the two clip half-planes as big polygons and intersect by redrawing.
        // Canvas only supports union for clip paths unless using compositing.
        // Best approach: just draw a filled polygon for the slice directly.

        ctx.restore();

        // ---- Final clean approach: construct slice polygon explicitly ----
        // Each slice edge is a line segment from center offset by half in the inward normal direction.
        // The slice boundary consists of:
        //   - Left edge: from inner point to outer point (shifted right of the left boundary by 'half')
        //   - Arc from left outer to right outer
        //   - Right edge: from outer point back to inner point

        // For the left boundary at angle a1:
        //   inward normal = direction a1 + π/2  → (-sin(a1), cos(a1))
        //   The edge runs parallel to direction a1 (cos(a1), sin(a1))
        //   shifted by 'half' in the inward normal direction
        //   pivot = (cx, cy) + half * inward_normal
        const ln1x = -Math.sin(a1), ln1y = Math.cos(a1); // inward normal for left edge
        const pivotL = { x: cx + half * ln1x, y: cy + half * ln1y };
        // The edge segment goes from pivotL out to radius R along direction a1:
        //   intersect with circle of radius R centered at (cx,cy)
        //   parametric: p = pivotL + t*(cos(a1), sin(a1))
        //   |p - (cx,cy)|² = R²
        const dLx = Math.cos(a1), dLy = Math.sin(a1);
        const fLx = pivotL.x - cx, fLy = pivotL.y - cy;
        const tL = solveLineCircle(fLx, fLy, dLx, dLy, R);
        // inner intersection (near center)
        const iLx = pivotL.x + tL.t1 * dLx, iLy = pivotL.y + tL.t1 * dLy;
        // outer intersection (far from center)
        const oLx = pivotL.x + tL.t2 * dLx, oLy = pivotL.y + tL.t2 * dLy;

        // For the right boundary at angle a2:
        //   inward normal = direction a2 - π/2  → (sin(a2), -cos(a2))
        const ln2x = Math.sin(a2), ln2y = -Math.cos(a2);
        const pivotR = { x: cx + half * ln2x, y: cy + half * ln2y };
        const dRx = Math.cos(a2), dRy = Math.sin(a2);
        const fRx = pivotR.x - cx, fRy = pivotR.y - cy;
        const tR = solveLineCircle(fRx, fRy, dRx, dRy, R);
        const iRx = pivotR.x + tR.t1 * dRx, iRy = pivotR.y + tR.t1 * dRy;
        const oRx = pivotR.x + tR.t2 * dRx, oRy = pivotR.y + tR.t2 * dRy;

        // Arc start/end angles: the outer points on the circle
        const arcStart = Math.atan2(oLy - cy, oLx - cx);
        const arcEnd   = Math.atan2(oRy - cy, oRx - cx);

        // Find the intersection of the two edge lines (the "inner tip" of the slice)
        // Left line:  pivotL + s * (cos(a1), sin(a1))
        // Right line: pivotR + u * (cos(a2), sin(a2))
        const tip = lineIntersect(pivotL.x, pivotL.y, dLx, dLy, pivotR.x, pivotR.y, dRx, dRy);

        ctx.save();
        ctx.translate(cx, cy);
        ctx.beginPath();

        if (tip && tip.s >= 0 && tip.u >= 0) {
          // Normal case: edges meet at a tip inside/near center
          const tipX = tip.x - cx, tipY = tip.y - cy;
          ctx.moveTo(tipX, tipY);
          ctx.lineTo(oLx - cx, oLy - cy);
          ctx.arc(0, 0, R, arcStart, arcEnd);
          ctx.lineTo(tipX, tipY);
        } else {
          // Edges don't converge (very wide slices or large gap): just go inner→outer on each side
          ctx.moveTo(iLx - cx, iLy - cy);
          ctx.lineTo(oLx - cx, oLy - cy);
          ctx.arc(0, 0, R, arcStart, arcEnd);
          ctx.lineTo(iRx - cx, iRy - cy);
          ctx.closePath();
        }

        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        ctx.restore();
      }
    }

    // Solve |f + t*d|² = R² → t² + 2(f·d)t + (|f|²-R²) = 0
    // Returns the two t values (t1 <= t2)
    function solveLineCircle(fx, fy, dx, dy, R) {
      const a = dx*dx + dy*dy;
      const b = 2 * (fx*dx + fy*dy);
      const c = fx*fx + fy*fy - R*R;
      const disc = Math.sqrt(b*b - 4*a*c);
      return { t1: (-b - disc) / (2*a), t2: (-b + disc) / (2*a) };
    }

    // Intersect two parametric lines: p1 + s*d1 = p2 + u*d2
    function lineIntersect(p1x, p1y, d1x, d1y, p2x, p2y, d2x, d2y) {
      const denom = d1x * d2y - d1y * d2x;
      if (Math.abs(denom) < 1e-10) return null;
      const dx = p2x - p1x, dy = p2y - p1y;
      const s = (dx * d2y - dy * d2x) / denom;
      const u = (dx * d1y - dy * d1x) / denom;
      return { x: p1x + s * d1x, y: p1y + s * d1y, s, u };
    }

    nSlider.addEventListener('input', draw);
    gapSlider.addEventListener('input', draw);
    draw();
  </script>
  <style>
  :root {
    --ink: #0a0f1e;
    --ink-light: #1c2340;
    --paper: #f5f2eb;
    --paper-warm: #ede9df;
    --gold: #c9a84c;
    --teal: #1a6b6b;
    --teal-light: #2a9090;
    --red: #8b2635;
    --muted: #6b7280;
    --success: #2d6a4f;
    --border: rgba(10,15,30,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(201,168,76,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 100%, rgba(26,107,107,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,242,235,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 3rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.15rem; display: flex; align-items: center; gap: 0.6rem; }
  .logo-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; }
  .header-right { display: flex; align-items: center; gap: 1.5rem; }
  .header-meta { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

  /* ── LOADING ── */
  .state-msg { display: flex; align-items: center; justify-content: center; min-height: 40vh; flex-direction: column; gap: 1rem; font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); letter-spacing: 0.06em; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── VIEWS ── */
  #view-index, #view-detail { position: relative; z-index: 1; }
  #view-detail { display: none; }

  /* ── INDEX ── */
  .index-hero { padding: 5rem 3rem 3rem; max-width: 1200px; margin: 0 auto; }
  .index-hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2.4rem, 5vw, 4rem); line-height: 1.1; max-width: 640px; margin-bottom: 1rem; }
  .index-hero h1 em { font-style: italic; color: var(--teal); }
  .index-subtitle { color: var(--muted); font-size: 0.95rem; max-width: 500px; line-height: 1.6; margin-bottom: 2.5rem; }

  .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
  .filter-btn { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.45rem 1rem; border: 1px solid var(--border); background: transparent; color: var(--muted); border-radius: 2rem; cursor: pointer; transition: all 0.18s; }
  .filter-btn:hover { border-color: var(--teal); color: var(--teal); }
  .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* search */
  .search-wrap { position: relative; }
  .search-input {
    font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.04em;
    padding: 0.45rem 1rem 0.45rem 2.2rem;
    border: 1px solid var(--border); border-radius: 2rem;
    background: transparent; color: var(--ink);
    width: 200px; transition: border-color 0.2s, width 0.3s;
    outline: none;
  }
  .search-input:focus { border-color: var(--teal); width: 240px; }
  .search-input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

  /* grid */
  .topics-grid { max-width: 1200px; margin: 0 auto; padding: 0 3rem 5rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5px; background: var(--border); border: 1px solid var(--border); }

  /* card */
  .topic-card { background: var(--paper); padding: 2rem; cursor: pointer; transition: background 0.2s; position: relative; overflow: hidden; animation: fadeUp 0.35s ease forwards; opacity: 0; }
  .topic-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--gold), var(--teal)); transform: scaleX(0); transform-origin: left; transition: transform 0.3s; }
  .topic-card:hover { background: var(--paper-warm); }
  .topic-card:hover::after { transform: scaleX(1); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
  .card-score { display: flex; flex-direction: column; align-items: flex-end; }
  .score-num { font-family: 'DM Serif Display', serif; font-size: 2.2rem; line-height: 1; }
  .score-denom { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); }
  .score-bar { width: 48px; height: 3px; background: var(--paper-warm); margin-top: 4px; border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--gold), var(--teal)); }
  .card-title { font-family: 'DM Serif Display', serif; font-size: 1.35rem; line-height: 1.2; flex: 1; padding-right: 1rem; }
  .card-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.55; margin-bottom: 1.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 1rem; }

  .tag { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 2px; border: 1px solid; }
  .tag-blue  { color: var(--teal); border-color: rgba(26,107,107,0.3); background: rgba(26,107,107,0.05); }
  .tag-gold  { color: #8a6e20; border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.08); }
  .tag-red   { color: var(--red); border-color: rgba(139,38,53,0.3); background: rgba(139,38,53,0.05); }

  .card-stakeholders { display: flex; align-items: center; gap: 0.4rem; font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); }
  .avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--ink-light); color: var(--paper); font-size: 0.55rem; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; border: 1.5px solid var(--paper); }
  .avatar-stack { display: flex; }
  .avatar-stack .avatar { margin-left: -6px; }
  .avatar-stack .avatar:first-child { margin-left: 0; }

  /* no results */
  .no-results { grid-column: 1/-1; padding: 4rem; text-align: center; font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); letter-spacing: 0.06em; }

  /* ── DETAIL ── */
  .detail-nav { max-width: 1200px; margin: 0 auto; padding: 1.5rem 3rem 0; display: flex; align-items: center; justify-content: space-between; }
  .back-btn { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); cursor: pointer; background: none; border: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.15s; }
  .back-btn:hover { color: var(--ink); }
  .back-btn svg { width: 14px; height: 14px; }

  .detail-layout { max-width: 1200px; margin: 0 auto; padding: 3rem; display: grid; grid-template-columns: 1fr 320px; gap: 4rem; }

  .detail-category { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
  .detail-category::before { content: ''; display: block; width: 20px; height: 1px; background: var(--teal); }
  .detail-title { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 4vw, 3.2rem); line-height: 1.1; margin-bottom: 1.5rem; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 2rem; }

  .detail-score-display { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 2.5rem; padding: 1.5rem; background: var(--ink); color: var(--paper); }
  .detail-score-big { font-family: 'DM Serif Display', serif; font-size: 4rem; line-height: 1; }
  .detail-score-meta { display: flex; flex-direction: column; gap: 0.2rem; }
  .detail-score-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.5; }
  .detail-score-bar { width: 120px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; margin-top: 0.25rem; }
  .detail-score-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--teal-light)); border-radius: 2px; }

  .section-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-body { font-size: 0.95rem; line-height: 1.7; color: var(--ink-light); margin-bottom: 2.5rem; }

  .actions-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.5rem; }
  .action-item { display: flex; gap: 1rem; align-items: flex-start; padding: 1rem 1.25rem; border: 1px solid var(--border); background: var(--paper-warm); transition: border-color 0.2s, transform 0.2s; }
  .action-item:hover { border-color: var(--gold); transform: translateX(4px); }
  .action-num { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--gold); font-weight: 500; margin-top: 2px; flex-shrink: 0; }
  .action-text { font-size: 0.88rem; line-height: 1.5; flex: 1; }
  .action-status { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 2px; flex-shrink: 0; align-self: center; }
  .status-open        { background: rgba(201,168,76,0.12); color: #8a6e20; }
  .status-in-progress { background: rgba(26,107,107,0.12); color: var(--teal); }
  .status-done        { background: rgba(45,106,79,0.12);  color: var(--success); }

  .sidebar-card { border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem; background: var(--paper-warm); }
  .sidebar-card h3 { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.25rem; }
  .stakeholder-item { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
  .stakeholder-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--ink); color: var(--paper); font-family: 'DM Mono', monospace; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .stakeholder-name { font-size: 0.875rem; font-weight: 600; display: block; }
  .stakeholder-role { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); }
  .meta-row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.65rem 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
  .meta-row:last-child { border-bottom: none; }
  .meta-key { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.05em; text-transform: uppercase; }
  .meta-val { font-weight: 500; }

  /* git badge */
  .git-link { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.06em; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; border: 1px solid var(--border); padding: 0.35rem 0.8rem; border-radius: 2rem; transition: all 0.18s; }
  .git-link:hover { color: var(--ink); border-color: var(--ink); }
  .git-link svg { width: 13px; height: 13px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp 0.38s ease forwards; opacity: 0; }

  @media (max-width: 768px) {
    header { padding: 0 1.25rem; }
    .index-hero { padding: 3rem 1.5rem 2rem; }
    .topics-grid { padding: 0 1.5rem 3rem; grid-template-columns: 1fr; }
    .detail-layout { grid-template-columns: 1fr; padding: 1.5rem; gap: 2rem; }
    .detail-nav { padding: 1rem 1.5rem 0; flex-wrap: wrap; gap: 0.75rem; }
    .search-input { width: 160px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-dot"></span><span id="site-title">Strategic Intelligence</span></div>
  <div class="header-right">
    <span class="header-meta" id="header-meta">Loading…</span>
    <a class="git-link" id="github-link" href="#" target="_blank">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      Edit on GitHub
    </a>
  </div>
</header>

<!-- INDEX VIEW -->
<div id="view-index">
  <div class="index-hero">
    <h1 id="hero-title">Financial Topics<br><em>Under Scrutiny</em></h1>
    <p class="index-subtitle" id="hero-subtitle">A living registry of strategic topics ranked by business importance, with stakeholder ownership and short-term action plans.</p>
    <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap; margin-bottom:1rem;">
      <div class="search-wrap">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="5"/><path d="M11 11l3 3"/></svg>
        <input class="search-input" id="search-input" type="text" placeholder="Search topics…" oninput="applyFilters()">
      </div>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
  </div>
  <div id="topics-container" style="position:relative;z-index:1;"></div>
</div>

<!-- DETAIL VIEW -->
<div id="view-detail">
  <div class="detail-nav">
    <button class="back-btn" onclick="showIndex()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3L5 8l5 5"/></svg>
      All Topics
    </button>
  </div>
  <div class="detail-layout">
    <div id="detail-main"></div>
    <div id="detail-sidebar"></div>
  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
// Point this to your raw topics.json file.
// On GitHub Pages this will be: './topics.json'
// If you rename the file or move it, update this path.
const DATA_URL = './topics.json';

// Optional: link to your GitHub repo so readers can suggest edits
const GITHUB_REPO = ''; // e.g. 'https://github.com/yourorg/your-repo'

// ── State ──────────────────────────────────────────────────────────────────
let db = null;           // full parsed topics.json
let activeTag = null;
let searchQuery = '';

// ── Tag colour map (extend as needed) ─────────────────────────────────────
const TAG_COLORS = {
  payment: 'tag-blue', research: 'tag-gold', 'credit card': 'tag-red',
  regulation: 'tag-red', blockchain: 'tag-blue', infrastructure: 'tag-gold',
};
function tagColor(t) { return TAG_COLORS[t] || 'tag-blue'; }
function initials(name) { return name.split(' ').map(n => n[0]).join(''); }

// ── Stakeholder lookup ─────────────────────────────────────────────────────
function getStakeholders(topic) {
  if (!db) return [];
  return (topic.stakeholders || []).map(ref => {
    if (typeof ref === 'object') return ref;                          // inline object
    return db.stakeholders.find(s => s.id === ref) || { name: String(ref), role: '' };
  });
}

// ── Load data ──────────────────────────────────────────────────────────────
async function loadData() {
  const container = document.getElementById('topics-container');
  container.innerHTML = `<div class="state-msg"><div class="spinner"></div><span>Loading topics…</span></div>`;

  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error(`Could not load topics.json (${res.status})`);
    db = await res.json();
    boot();
  } catch (e) {
    container.innerHTML = `
      <div class="state-msg">
        <div style="border:1px solid rgba(139,38,53,0.3);background:rgba(139,38,53,0.05);color:var(--red);
             padding:1.5rem 2rem;font-family:'DM Mono',monospace;font-size:0.75rem;max-width:480px;line-height:1.7;">
          <strong>Failed to load topics.json</strong><br><br>
          ${e.message}<br><br>
          If running locally, serve the folder with:<br>
          <code>python -m http.server 3000</code><br>
          then open <code>http://localhost:3000</code>
        </div>
      </div>`;
  }
}

function boot() {
  // Header / hero copy from meta
  const meta = db.meta || {};
  document.title = meta.title || 'Strategic Intelligence';
  document.getElementById('site-title').textContent = meta.title || 'Strategic Intelligence';

  // GitHub link
  const ghLink = document.getElementById('github-link');
  if (GITHUB_REPO) { ghLink.href = GITHUB_REPO; }
  else { ghLink.style.display = 'none'; }

  // Build filter buttons from tags list
  const filterBar = document.getElementById('filter-bar');
  const tags = db.tags || [...new Set(db.topics.flatMap(t => t.tags))];
  filterBar.innerHTML =
    `<button class="filter-btn active" onclick="setTag(null, this)">All Topics</button>` +
    tags.map(t => `<button class="filter-btn" onclick="setTag('${t}', this)">${t}</button>`).join('');

  renderIndex();
}

// ── Filtering & search ─────────────────────────────────────────────────────
function setTag(tag, btn) {
  activeTag = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderIndex();
}

function applyFilters() {
  searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
  renderIndex();
}

function filteredTopics() {
  return (db.topics || [])
    .filter(t => !activeTag || t.tags.includes(activeTag))
    .filter(t => {
      if (!searchQuery) return true;
      return t.title.toLowerCase().includes(searchQuery) ||
             (t.description || '').toLowerCase().includes(searchQuery) ||
             t.tags.some(tag => tag.includes(searchQuery));
    });
}

// ── Render index ───────────────────────────────────────────────────────────
function renderIndex() {
  const topics = filteredTopics();
  const total = (db.topics || []).length;
  document.getElementById('header-meta').textContent =
    `${topics.length} of ${total} Topic${total !== 1 ? 's' : ''}`;

  const container = document.getElementById('topics-container');
  if (!topics.length) {
    container.innerHTML = `<div class="topics-grid"><div class="no-results">No topics match your filters.</div></div>`;
    return;
  }

  container.innerHTML = `
    <div class="topics-grid">
      ${topics.map((t, i) => {
        const stakeholders = getStakeholders(t);
        return `
        <div class="topic-card" style="animation-delay:${i * 0.05}s" onclick="showDetail(${t.id})">
          <div class="card-top">
            <div class="card-title">${t.title}</div>
            <div class="card-score">
              <div class="score-num">${t.score}</div>
              <div class="score-denom">/ 10</div>
              <div class="score-bar"><div class="score-fill" style="width:${t.score * 10}%"></div></div>
            </div>
          </div>
          <p class="card-desc">${t.description || ''}</p>
          <div class="card-tags">
            ${t.tags.map(tag => `<span class="tag ${tagColor(tag)}">${tag}</span>`).join('')}
          </div>
          <div class="card-stakeholders">
            <div class="avatar-stack">
              ${stakeholders.map(s => `<div class="avatar" title="${s.name}">${initials(s.name)}</div>`).join('')}
            </div>
            <span>${stakeholders.map(s => s.name.split(' ')[0]).join(', ') || '—'}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

// ── Render detail ──────────────────────────────────────────────────────────
function showDetail(id) {
  const t = db.topics.find(x => x.id === id);
  if (!t) return;

  document.getElementById('view-index').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  window.scrollTo(0, 0);

  // Push to URL hash so the page is linkable
  history.pushState({ topicId: id }, '', `#topic-${id}`);

  const stakeholders = getStakeholders(t);

  document.getElementById('detail-main').innerHTML = `
    <div class="detail-header fade-up">
      <div class="detail-category">Strategic Topic</div>
      <h1 class="detail-title">${t.title}</h1>
      <div class="detail-tags">
        ${t.tags.map(tag => `<span class="tag ${tagColor(tag)}">${tag}</span>`).join('')}
      </div>
      <div class="detail-score-display">
        <div class="detail-score-big">${t.score}</div>
        <div class="detail-score-meta">
          <span class="detail-score-label">Importance Score</span>
          <div class="detail-score-bar"><div class="detail-score-fill" style="width:${t.score * 10}%"></div></div>
          <span class="detail-score-label">out of 10</span>
        </div>
      </div>
    </div>
    <div class="fade-up" style="animation-delay:0.1s">
      <div class="section-label">Description</div>
      <p class="section-body">${t.description || 'No description provided.'}</p>
    </div>
    <div class="fade-up" style="animation-delay:0.2s">
      <div class="section-label">Short-Term Actions</div>
      <div class="actions-list">
        ${t.actions && t.actions.length
          ? t.actions.map((a, i) => {
              const status = a.status || 'open';
              const text = typeof a === 'string' ? a : a.description;
              return `
              <div class="action-item">
                <span class="action-num">0${i + 1}</span>
                <span class="action-text">${text}</span>
                <span class="action-status status-${status.replace(' ', '-')}">${status}</span>
              </div>`;
            }).join('')
          : '<p style="color:var(--muted);font-size:0.85rem">No actions recorded.</p>'
        }
      </div>
    </div>`;

  document.getElementById('detail-sidebar').innerHTML = `
    <div class="sidebar-card fade-up" style="animation-delay:0.15s">
      <h3>Stakeholders</h3>
      ${stakeholders.length
        ? stakeholders.map(s => `
          <div class="stakeholder-item">
            <div class="stakeholder-avatar">${initials(s.name)}</div>
            <div>
              <span class="stakeholder-name">${s.name}</span>
              <span class="stakeholder-role">${s.role || ''}</span>
            </div>
          </div>`).join('')
        : '<p style="color:var(--muted);font-size:0.82rem">No stakeholders assigned.</p>'
      }
    </div>
    <div class="sidebar-card fade-up" style="animation-delay:0.25s">
      <h3>Metadata</h3>
      <div class="meta-row"><span class="meta-key">Last Updated</span><span class="meta-val">${t.updated_at || db.meta?.updated || '—'}</span></div>
      <div class="meta-row"><span class="meta-key">Priority</span><span class="meta-val">${t.priority || '—'}</span></div>
      <div class="meta-row"><span class="meta-key">Time Horizon</span><span class="meta-val">${t.horizon || '—'}</span></div>
      <div class="meta-row"><span class="meta-key">Actions</span><span class="meta-val">${(t.actions || []).length} items</span></div>
      <div class="meta-row"><span class="meta-key">Score</span><span class="meta-val">${t.score} / 10</span></div>
    </div>`;
}

function showIndex() {
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-index').style.display = 'block';
  history.pushState({}, '', window.location.pathname);
  window.scrollTo(0, 0);
}

// Handle back/forward browser navigation
window.addEventListener('popstate', (e) => {
  if (e.state && e.state.topicId) {
    showDetail(e.state.topicId);
  } else {
    showIndex();
  }
});

// Handle direct link to a topic via URL hash on load
function checkHash() {
  const match = window.location.hash.match(/^#topic-(\d+)$/);
  if (match && db) showDetail(parseInt(match[1]));
}

// ── Start ──────────────────────────────────────────────────────────────────
loadData().then(checkHash);
</script>
</body>
</html>
