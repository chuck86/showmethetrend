  - id: 3
    title: "Open Banking"
    category: Banking Regulatory and Trends
    score: 5
    priority: Medium
    horizon: 18–30 months
    management_summary: |-
      Open Banking bezeichnet die regulierte Öffnung von Bankdaten und -dienstleistungen für lizenzierte Drittanbieter über standardisierte Schnittstellen (APIs). 
      Auf Basis der EU-Zahlungsdiensterichtlinie PSD2 müssen Banken autorisierten Drittanbietern (TPPs) den Zugang zu Kontodaten sowie die Auslösung von Zahlungen 
      ermöglichen – stets mit ausdrücklicher Zustimmung des Kunden. Open Banking verändert die Rolle klassischer Banken grundlegend: vom geschlossenen Datentresor 
      zum offenen Ökosystem-Teilnehmer.
      
      ## Aktueller Stand – Deutschland & EU
      PSD2 ist in Deutschland und der EU vollständig in Kraft. Die geplante Nachfolgeregelung PSD3 sowie die EU-Open-Finance-Verordnung FIDA werden den Anwendungsbereich 
      ab 2026/2027 erheblich ausweiten – von Zahlungskonten auf Sparprodukte, Kredite, Versicherungen und Wertpapiere. Technisch haben sich Berlin Group NextGenPSD2 und 
      STET als dominierende API-Frameworks etabliert.
      
      ##Ausblick & Chancen für unser Unternehmen
      Open Banking eröffnet strategische Wachstumspotenziale in drei Kerndimensionen:
      
      **Kartengeschäft:** Ergänzung durch Account-to-Account-Zahlungen (A2A) und datenbasiertes Kreditscoring.
      **Zahlungsverkehr:** Aufbau von Premium-API-Diensten für Firmenkunden; Zahlungsinitiierung ohne Karte.
      **Online- & Mobile Banking:** Differenzierung durch konsolidierte Finanzdashboards, KI-gestützte PFM-Funktionen und Embedded-Finance-Partnerschaften.
      
