  - id: 2
    title: girocard 4.0
    category: Digital Payments
    score: 6
    priority: High
    horizon: 12–24 months
    management_summary: |-
      Girocard 4.0 steht für die Transformation der klassischen deutschen Debitkarte hin zu einer voll digitalen, app- und walletfähigen Bezahllösung mit neuen Funktionen für Handel, Banken und Kund:innen. 

      ## Strategische Einordnung

      Die Weiterentwicklung zur „Girocard 4.0“ folgt einem klar definierten Fahrplan, der auf vier Säulen beruht: flexible Autorisierung von Zahlungen, In‑App‑Zahlungen, Integration in Wallets sowie Zusatzfunktionen für Kund:innenbindung 
      (z.B. digitale Belege, Loyalty). Damit positioniert sich die girocard als moderne, europäische Alternative zu internationalen Debit‑Schemes und Big‑Tech‑Bezahllösungen und soll ihre führende Rolle im deutschen Kartenzahlungsverkehr 
      in die mobile und digitale Welt überführen. 

      ## Neue Funktionalitäten und Kunden-Erlebnis

      Erste Institute – insbesondere Volks- und Raiffeisenbanken – ermöglichen inzwischen, die girocard direkt in der Banking‑App zu hinterlegen und sowohl auf Android als auch auf iOS mobil und kontaktlos am POS zu nutzen, ohne zwingend 
      Apple Pay oder separate Pay‑Apps zu verwenden. Parallel wird die girocard für In‑App‑Zahlungen ausgebaut, sodass Kund:innen Zahlungen direkt innerhalb von Shopping‑Apps anstoßen können, ohne in eine externe Payment‑Umgebung wechseln 
      zu müssen. Ergänzend sieht der Fahrplan Funktionen wie die Vor‑Autorisierung mit späterer finaler Belastung (z.B. Hotellerie, Autovermietung), digitale Kassenbons und die Anbindung an Bonus‑ und Loyalty‑Programme vor. 

      ## Technologische und regulatorische Treiber

      Technisch profitiert Girocard 4.0 von der breiten Unterstützung der digitalen girocard auf NFC‑fähigen Smartphones und Wearables sowie von neuen regulatorischen Vorgaben, die etwa die Öffnung der NFC‑Schnittstelle auf iOS für Banking‑Apps ermöglichen. 
      Für Banken entsteht dadurch die Chance, eigene, integrierte Bezahl-Ökosysteme in ihren Apps zu etablieren, während Händler eine nahtlosere Customer Journey am POS und in Mobile‑Kanälen erhalten. Gleichzeitig bleibt die girocard in das etablierte deutsche 
      Akzeptanznetz mit über einer Million Terminals eingebettet und kann so Innovation auf Basis bestehender Infrastruktur skalieren. 

      ## Implikationen für Institute und Händler

      Für Banken bedeutet Girocard 4.0, dass die eigene Mobile‑Banking‑App zunehmend zur zentralen Payment‑Plattform wird, die Karten-Tokenisierung, Wallet‑Integration und neue Autorisierungslogiken unterstützt und sich im Wettbewerb mit globalen Wallet‑Anbietern 
      behaupten muss. Händler erhalten mit In‑App‑ und In‑Wallet‑girocard‑Zahlungen eine kosteneffiziente, im deutschen Markt vertraute Zahlart, die sich nahtlos in Omnichannel‑Konzepte (Online, Mobile, POS) integrieren lässt und zusätzliche Mehrwertservices (Belege, Loyalty) 
      ermöglicht. Insgesamt markiert Girocard 4.0 damit den Übergang von der physischen „EC‑Karte“ hin zu einer wettbewerbsfähigen, digitalen Debit‑Plattform im europäischen Zahlungsverkehr. 
    management_summary_en: |-
      girocard 4.0 is the most significant scheme modernisation since the introduction of contactless. Failure to migrate on time risks exclusion from Apple Pay and Google Pay wallet ecosystems, which are now primary payment interfaces for under-40 demographics. 
      Migration investment is non-negotiable; the commercial opportunity lies in wallet-native product features.
      
      Currently some banks are already provide their customers with in-app girocard transactions (android and iOS).
    description: |-
      Girocard 4.0 ist die Weiterentwicklung der deutschen Debitkarte zu einer digitalen Plattform mit In‑App‑Zahlungen (Android/iOS) und Wallet‑Integration.
  
      Erste Banken wie Volks- und Raiffeisenbanken bieten die girocard direkt in ihren Banking‑Apps für kontaktloses Bezahlen ohne Apple Pay.
  
      Neue Features umfassen Vor‑Autorisierungen, digitale Belege und Loyalty‑Funktionen.

      Ziel: Wettbewerbsfähiges Debit‑Ökosystem für POS, Online und Mobile im deutschen Markt
    description_en: |- 
      Girocard 4.0 is the evolution of the German debit card into a digital platform with in-app payments (Android/iOS) and wallet integration.
  
      Starting banks, such as Volksbanken and Raiffeisenbanken, offer the girocard directly in their banking apps for contactless payments without Apple Pay.
  
      New features include pre-authorizations, digital receipts, and loyalty programs.

      Goal: A competitive debit ecosystem for POS, online, and mobile in the German market.
    extended_description: |-
      Girocard 4.0 markiert die umfassende Digitalisierung der deutschen Debitkarte, initiiert von der Deutschen Kreditwirtschaft, um sie mit internationalen Standards (Wallets, E‑Commerce) gleichzuziehen.

      ## Technische Grundlagen
      
      Der proprietäre EMV‑Kernel wird durch eine tokenisierungsfähige Architektur ersetzt, die Apple Pay, Google Pay und deutsche OEM‑Wallets (Samsung, Huawei) nativ integriert.

      EURO Kartensysteme GmbH als Systemmanager definiert den Fahrplan:

      **Girocard 2.0:** E‑Commerce und In‑App‑Transaktionen

      **Girocard 3.0:** Erweiterte E‑/App‑Zahlungen

      **Girocard 4.0:** Komfort & Mehrwert (digitale Belege, Loyalty)

      TSP‑Anbindung (Token Service Provider) obligatorisch auf Emittentenebene; Atruvia-Kunden erhalten standardisierten Migrationspfad, unabhängige PSPs implementieren separat.

      ## Neue Funktionalitäten
      
      E‑Commerce schließt die Lücke zu Kreditkarten (Maestro auslaufend): Online‑Käufe, Vor‑Autorisierungen (Hotels, Mietwagenreservierungen), In‑App‑Zahlungen direkt aus Banking‑Apps.

      Erste Institute (Volks-/Raiffeisenbanken) bieten girocard in‑App für Android/iOS – kontaktlos am POS ohne Big‑Tech‑Wallets.

      **Mehrwertservices:** Digitale Kassenbons, Loyalty‑Programme, flexible Belastungslogik.

      ## Strategische Bedeutung
      
      **Nationale Souveränität:** Weniger Abhängigkeit von internationalen Schemes, Stärkung der deutschen Zahlungsinfrastruktur.

      **Banken:** Eigene Apps werden Payment‑Hubs mit Omnichannel‑Integration (POS/Online/App).
      
      **Händler:** Kostengünstige Debit‑Option mit erweiterter Akzeptanz.
      
      **Kunden:** Nahtloses Erlebnis über alle Kanäle/Wallets.

      ## Zeitplan und Migration
      
      Vollständige Migration bis Ende 2026, Übergangsphase bis 2027 mit parallelem Betrieb alter/neuer Kernel.

      Atruvia-Kunden profitieren von einheitlichem Pfad; frühzeitige TSP‑Integration und Testumgebungen empfohlen.

      EURO Kartensysteme koordiniert Zertifizierungen, Rollout und Schulungen.
    extended_description_en: |-
      Girocard 4.0 marks the comprehensive digitization of the German debit card, initiated by the German banking industry to bring it in line with international standards (wallets, e-commerce).

      ## Technical Foundations

      The proprietary EMV kernel is replaced by a tokenization-enabled architecture that natively integrates Apple Pay, Google Pay, and German OEM wallets (Samsung, Huawei).

      EURO Kartensysteme GmbH, as system manager, defines the roadmap:

      **Girocard 2.0:** E-commerce and in-app transactions

      **Girocard 3.0:** Enhanced e-/app payments

      **Girocard 4.0:** Convenience & added value (digital receipts, loyalty)

      TSP (Token Service Provider) integration is mandatory at the issuer level; Atruvia customers receive a standardized migration path, independent PSPs implement separately.

      **Girocard 2.0:** E-commerce and in-app transactions

      **Girocard 3.0:** Enhanced e-/app payments

      **Girocard 4.0:** Convenience & added value (digital receipts, loyalty)

      **TOP Service Provider (TSP) integration is mandatory at the issuer level; Atruvia customers receive a standardized migration path, independent PSPs implement separately. ## New Functionalities

      E-commerce closes the gap with credit cards (Maestro is being phased out): online purchases, pre-authorizations (hotels, rental car reservations), and in-app payments directly from banking apps.

      The first institutions (cooperative banks/Raiffeisenbanks) offer girocard in-app payments for Android/iOS – contactless at the POS without Big Tech wallets.

      **Value-added services:** Digital receipts, loyalty programs, and flexible debit logic.

      ## Strategic Importance

      **National sovereignty:** Reduced dependence on international schemes and strengthening of the German payment infrastructure.

      **Banks:** Dedicated apps become payment hubs with omnichannel integration (POS/online/app).

      **Merchants:** A cost-effective debit option with expanded acceptance.

      **Customers:** Seamless experience across all channels/wallets.

      ## Timeline and Migration

      Full migration by the end of 2026, transition phase until 2027 with parallel operation of the old/new kernel.

      Atruvia customers benefit from a unified path; early TSP integration and test environments are recommended.

      EURO Kartensysteme coordinates certifications, rollout, and training.
    risks:
      - Hohe Investitionen in Technologie. Schulungen erforderlich.
      - |- 
        Dichte Marktstruktur: Internationale Systeme sind bereits etabliert. Marktkapitalisierung schwieriger zu erreichen. Nur relevant für den deutschen Markt.
      - |-
        Verzögerung der Migration birgt das Risiko, von der Integration von Apple Pay und Google Pay ausgeschlossen zu werden und Marktanteile an Visa/Mastercard Debit zu verlieren.
      - |-
        Die Komplexität der TSP-Integration wird möglicherweise unterschätzt, insbesondere bei Banken mit veralteten Ausgabesystemen.
      - |-
        Die Gebührenstruktur des Systems unter girocard 4.0 ist noch nicht finalisiert; Kostensteigerungen sind möglich.
      - |-
        Die Bereitschaft der Händler-Acquirer ist unterschiedlich; unvollständige Terminal-Upgrades könnten das Akzeptanznetzwerk fragmentieren.
    risks_en:
      - High investmens in technology. Training necessary.
      - |-
        Dense market: international schemes are already established. Market capitalization more difficult. Only relevant for german market.
      - |-
        Migration delay risks exclusion from Apple Pay and Google Pay wallet integrations, ceding market share to Visa/Mastercard debit.
      - |-
        TSP integration complexity may be underestimated, particularly for banks with legacy issuing systems.
      - Scheme fee structure under girocard 4.0 is not yet finalised; cost increase is
        possible.
      - |-
        Merchant acquirer readiness varies; incomplete terminal estate upgrades could fragment the acceptance network.
    chances:
      - |-
        Die Integration der mobilen Geldbörse von Girocard gewinnt Marktanteile im digitalen Zahlungsverkehr von Visa/Mastercard unter deutschen Debitkarteninhabern zurück.
      - |-
        Die E-Commerce-Funktionalität eröffnet einen neuen Akzeptanzkanal für girocard, der bisher im Online-Handel nicht vorhanden war.
      - |-
        Die Tokenisierungsinfrastruktur ist für die Verteilung des digitalen Euro und die zukünftige Integration von CBDC-Wallets wiederverwendbar.
      - |-
        Ein gestärktes inländisches System reduziert das Interbankenrisiko und hält die Zahlungsdaten innerhalb des deutschen Bankensystems.
      - |-
        Erweiterung des Geschäftsmodells durch das Angebot neuer Dienstleistungen auf Basis neuer technischer Möglichkeiten
    chances_en:
      - |-
        girocard mobile wallet integration recaptures digital payment share from Visa/Mastercard among German debit cardholders
      - |-
        E-commerce capability opens a new acceptance channel for girocard, previously absent from online retail.
      - |-
        Tokenisation infrastructure is reusable for Digital Euro distribution and future CBDC wallet integration.
      - |-
        Strengthened domestic scheme reduces interchange exposure and keeps payment data within the German banking ecosystem.
      - Business modell expansion by offering new services based on new technical possibilities
