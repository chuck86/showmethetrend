- id: 12
  title: Quantencomputing
  category: IT Security
  score: 2
  priority: Low
  horizon: 24-120 months
  management_summary:
    summary: |-
      ## Aktueller Stand

      Quantumcomputing ist für den Finanzsektor strategisch relevant, weil die Technologie mittelfristig neue Möglichkeiten bei Optimierung, Risikoanalysen und Betrugserkennung eröffnet, **kurzfristig aber vor allem ein erhebliches Kryptografie- und Resilienzrisiko** darstellt. Für Banken und zentrale IT-Dienstleister ist der aktuelle Schwerpunkt daher weniger die breite Produktivnutzung, sondern die Vorbereitung auf Post-Quantum-Kryptografie, die Risikoanalyse kritischer Systeme und der Aufbau von Know-how, auch wenn die Marktreife der Technologie erst in 10-20 Jahren erwartet wird.

      ## Strategische Bedeutung

      - Quantencomputing kann eine Bedrohung für bestehende "Verfahrensweisen" sein.
      - Für Finanzindustrie u.a. die Bedrohung bestehender Verschlüsselungsverfahren wichtig (Gefahr des "Q-Day"). Post-Quanten-Kryptografie, aber auch neue Möglichkeiten durch Beschleunigung komplexer Berechnungen bei Risikomodellierung, Portfoliooptimierung oder Betrugserkennung. Thema in der Wirtschaft bekannt, wird aber (noch) nicht entschieden adressiert

      ## Handlungsempfehlungen

       Start eines strukturiertes Quantum-Readiness-Programm, inklusive Inventarisierung kryptografischer Abhängigkeiten, Migrationsroadmap und gezielter Pilotierungen in ausgewählten Fachbereichen
    strategic_importance: ''
    course_of_action: ''
  management_summary_en: TBD
  description: |-
    Quantencomputing ist eine wegweisende Technologie mit noch nicht vollständig absehbaren Auswirkungen auf die Finanzbranche. Es können sich neue Möglichkeiten eröffnen (u.a. durch Beschleunigung komplexer Berechnungen wie Risikomodellierung, Portfoliooptimierung oder Betrugserkennung) aber auch enorme Gefahren ergeben („Q-Day“, an dem aktuelle Verschlüsselungsstandards gebrochen werden können).

    Ehe sich ein breiter praktischer Nutzen einstellt, müssen einige Herausforderungen überwunden werden, u.a. eine stark limitierte Hardware und eine komplexe Integration in bestehende Systeme.

    Auch wenn die Marktreife noch Jahre entfernt ist, muss die Entwicklung aufmerksam verfolgt werden.
  description_en: TBD
  extended_description: "## Aktueller Stand\n\nDer aktuelle Stand ist geprägt von\
    \ 2 parallelen Entwicklungen.\n\n1. Zunahme des Interesses an praktischen Quantum-Anwendungen\
    \ im Finanzsektor zu, etwa in Portfolio-Optimierung, Risikomanagement und Betrugsprävention\n\
    2. Absicherung bestehender Systeme gegen Quantenrisiken rückt in den Vordergrund.\
    \ Gerade für Banken ist das relevant, weil **Zahlungsverkehr, Kernbanksysteme\
    \ und sicherheitskritische Infrastrukturen auf langlebige kryptografische Verfahren\
    \ angewiesen sind**, die künftig durch leistungsfähige Quantencomputer gefährdet\
    \ sein könnten\n\nDie europäische und deutsche Diskussion fokussiert daher stark\
    \ auf die Migration zu Post-Quantum-Kryptografie sowie auf Governance, Kompetenzen\
    \ und Pilotprojekte. Für die Bundesregierung sind Quantentechnologien priorisierte\
    \ Technologien der Hightech Agenda Deutschland - u.A. mit Schwerpunkt Quantencomputer\
    \ (bis 20230 sollen mindestens zwei fehlerkorrigierte Quantencomputer auf europäischem\
    \ Spitzenniveau realisiert werden). Die EU hat für 2026 den Quantum Act angekündigt.\n\
    ## Regulatorik & Zeitplan\n\nRegulatorisch ist das Thema eng mit europäischer\
    \ Cyber- und Resilienzregulierung verknüpft. Die EU arbeitet an einer Quantum-Strategie\
    \ und einem geplanten Quantum Act, der voraussichtlich 2026 weiter konkretisiert\
    \ wird; parallel gibt es eine koordinierte Roadmap für die Umstellung auf Post-Quantum-Kryptografie.\
    \ Für den Finanzsektor ist außerdem relevant, dass der G7 Cyber Expert Group Anfang\
    \ 2026 eine koordinierte Umsetzungslogik für den Übergang zur Post-Quantum-Kryptografie\
    \ unterstützt hat, mit Beginn der Risikoanalyse und Planung bereits 2026. In Deutschland\
    \ wird das Thema auch von Bundesbank, BaFin und Branchenverbänden aktiv adressiert,\
    \ unter anderem im Kontext von BaFinTech und Positionspapieren der Bankenverbände.\
    \ \n\n## Funktionalitäten\n\n## Technische Aspekte\n\nTechnisch ist kurzfristig\
    \ besonders wichtig, welche Systeme heute auf kryptografischen Verfahren wie RSA,\
    \ ECC oder entsprechende Zertifikats- und Schlüsselmanagement-Mechanismen angewiesen\
    \ sind. Eine typische Herausforderung besteht darin, dass nicht alle Risiken sofort\
    \ sichtbar sind: Viele Systeme speichern Daten heute verschlüsselt, die erst in\
    \ einigen Jahren von Angreifern entschlüsselt werden könnten, wenn Quantencomputer\
    \ weit genug sind. Deshalb sind Inventarisierung, Priorisierung und Migrationsfähigkeit\
    \ zentrale technische Aufgaben. Für zentrale Dienstleister im Bankenumfeld bedeutet\
    \ das auch, dass Schnittstellen, HSM-Setups, Zertifikatsketten, Identitäts- und\
    \ Signaturprozesse sowie Lieferantenabhängigkeiten betrachtet werden müssen.\n\
    \n## Bedeutung für den Finanzsektor\n   \n## Non-EU-Perspektive\n\nFür Deutschland\
    \ und die EU ist zu erwarten, dass 2026 bis 2030 vor allem die Umstellung auf\
    \ quantum-resistente Kryptografie und die Vorbereitung kritischer Infrastrukturen\
    \ dominieren werden. Außerhalb der EU wird die Entwicklung ebenfalls vorangetrieben,\
    \ insbesondere in den USA und im UK, wobei dort ähnliche Fragen zu Kryptografie,\
    \ Governance und Sicherheitsstandards im Mittelpunkt stehen. Damit ist Quantumcomputing\
    \ im Finanzsektor aktuell weniger ein Produkt- als ein Transformations- und Resilienzthema,\
    \ das jetzt strukturiert vorbereitet werden sollte\n\n## Strategische Empfehlungen\n\
    \nStrategisch ist Quantumcomputing ein Doppelthema: Chance und Risiko zugleich.\
    \ Auf der Chancenseite liegen langfristig schnellere Entscheidungsmodelle, bessere\
    \ Optimierung und neue analytische Verfahren; auf der Risikoseite steht die Gefahr,\
    \ dass heutige Sicherheitsstandards an Wirksamkeit verlieren. Für ein Unternehmen\
    \ im IT- und Finanzsektor ist daher eine frühe Positionierung wichtig, weil sie\
    \ sowohl regulatorische Handlungsfähigkeit als auch Glaubwürdigkeit gegenüber\
    \ Banken stärkt. Wer früh vorbereitet ist, kann später sowohl Sicherheitsanforderungen\
    \ besser erfüllen als auch Quantum-Anwendungen gezielt evaluieren\n\nHandlungsempfehlungen\
    \ für die nächsten 12 bis 24 Monate sind:\n\n- Kryptografische Bestandsaufnahme\
    \ aller kritischen Anwendungen, Schnittstellen und Drittanbieterbeziehungen.\n\
    \n- Priorisierte Roadmap zur Post-Quantum-Migration mit Fokus auf besonders schützenswerte\
    \ Daten und Systeme.\n\n- Aufbau eines interdisziplinären Quantum-Governance-Teams\
    \ aus IT-Security, Architektur, Compliance und Fachbereichen.\n\n- Pilotierungen\
    \ mit klar abgegrenztem Business Case, etwa in Optimierung, Fraud Detection oder\
    \ Risikomodellen.\n\n- Schulung von Management und Fachbereichen, damit Risiken,\
    \ Zeitachsen und Investitionsbedarf früh verstanden werden."
