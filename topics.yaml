- id: 3
  title: Open Banking
  category: Banking Regulatory and Trends
  score: 5
  priority: Medium
  horizon: 18–30 months
  management_summary:
    summary: "Open Banking bezeichnet die regulierte Öffnung von Bankdaten und -dienstleistungen\
      \ für lizenzierte Drittanbieter über standardisierte Schnittstellen (APIs).\
      \ \nAuf Basis der EU-Zahlungsdiensterichtlinie PSD2 müssen Banken autorisierten\
      \ Drittanbietern (TPPs) den Zugang zu Kontodaten sowie die Auslösung von Zahlungen\
      \ \nermöglichen – stets mit ausdrücklicher Zustimmung des Kunden. Open Banking\
      \ verändert die Rolle klassischer Banken grundlegend: vom geschlossenen Datentresor\
      \ \nzum offenen Ökosystem-Teilnehmer.\n\n## Aktueller Stand – Deutschland &\
      \ EU\nPSD2 ist in Deutschland und der EU vollständig in Kraft. Die geplante\
      \ Nachfolgeregelung PSD3 sowie die EU-Open-Finance-Verordnung FIDA werden den\
      \ Anwendungsbereich \nab 2026/2027 erheblich ausweiten – von Zahlungskonten\
      \ auf Sparprodukte, Kredite, Versicherungen und Wertpapiere. Technisch haben\
      \ sich Berlin Group NextGenPSD2 und \nSTET als dominierende API-Frameworks etabliert.\n\
      \n##Ausblick & Chancen für unser Unternehmen\nOpen Banking eröffnet strategische\
      \ Wachstumspotenziale in drei Kerndimensionen:\n\n**Kartengeschäft:** Ergänzung\
      \ durch Account-to-Account-Zahlungen (A2A) und datenbasiertes Kreditscoring.\n\
      **Zahlungsverkehr:** Aufbau von Premium-API-Diensten für Firmenkunden; Zahlungsinitiierung\
      \ ohne Karte.\n**Online- & Mobile Banking:** Differenzierung durch konsolidierte\
      \ Finanzdashboards, KI-gestützte PFM-Funktionen und Embedded-Finance-Partnerschaften.\n\
      \n## Handlungsempfehlung:\n\nTBD"
    strategic_importance: ''
    course_of_action: ''
  management_summary_en: TBD
  description: "Open Banking ist ein Konzept, das Banken dazu verpflichtet bzw. ermutigt,\
    \ ihre Konto- und Transaktionsdaten über offene, standardisierte Programmierschnittstellen\
    \ (APIs) für autorisierte \nDrittanbieter zugänglich zu machen. Die Kontrolle\
    \ verbleibt dabei stets beim Kunden: Nur mit seiner ausdrücklichen Zustimmung\
    \ (Consent) dürfen Drittanbieter auf seine Daten zugreifen oder \nZahlungen in\
    \ seinem Namen auslösen.\n\nZiel ist die Förderung von Wettbewerb, Innovation\
    \ und Transparenz im Finanzsektor. Für Verbraucher entstehen Mehrwertdienste wie\
    \ automatisches Kontomanagement, digitale Bonitätsprüfungen oder \nMultibank-Übersichten.\
    \ Für Unternehmen eröffnen sich neue Geschäftsmodelle rund um Datendienste, Zahlungsinitiierung\
    \ und Embedded Finance.\n\nKernprinzipien: Kundenzentriert (Consent-basiert) ·\
    \ Regulatorisch gesichert (PSD2/PSD3) · Technisch standardisiert (APIs) · Wettbewerbsfördernd"
  description_en: TBD
  extended_description: "Open Banking beschreibt das Öffnen von Bankinfrastrukturen\
    \ durch standardisierte APIs, die Drittanbietern (TPPs) mit Kundenzustimmung Zugriff\
    \ auf Kontodaten und Zahlungsdienste ermöglichen. Es basiert primär auf der \n\
    EU-Verordnung PSD2, die erste Open APIs vorschreibt, und entwickelt sich zu Open\
    \ Finance weiter. [coredo](https://coredo.eu/open-banking-in-2026-changes-in-licensing/)\n\
    \n## Regulatorischer Rahmen (PSD2 bis PSD3/FIDA)\n\nDie **Payment Services Directive\
    \ 2 (PSD2)**, seit 2018 EU-Recht und in Deutschland via Zahlungsdiensteaufsichtsgesetz\
    \ (ZAG) umgesetzt, verpflichtet Account Servicing Payment Service Providers (ASPSPs,\
    \ i.e. Banken) \nzur Bereitstellung von **XS2A-APIs** (Access to Account). Diese\
    \ umfassen Account Information Services (AIS) für Kontodaten und Payment Initiation\
    \ Services (PIS) für Zahlungsauslösung. [bvr](https://www.bvr.de/Presse/Deutsche_Kreditwirtschaft/Berlin_Group_veroeffentlicht_Version_1_0_des_NextGenPSD2_Standards)\n\
    TPPs müssen von Aufsichtsbehörden wie der BaFin lizenziert werden (AISP für AIS,\
    \ PISP für PIS) und nutzen **OAuth 2.0** für Authentifizierung sowie **Strong\
    \ Customer Authentication (SCA)** gemäß EBA-Richtlinien. [arb](https://www.arb.ro/wp-content/uploads/FSFD-Editia-1-2018-Ortwin-Scheja-Berlin-Group-1.pdf)\n\
    Ab 2026 ersetzt **PSD3** (Payment Services Directive 3) mit der Payment Services\
    \ Regulation (PSR) PSD2 schrittweise: Strengere API-Pflichten (z.B. Verfügbarkeit\
    \ >99%, standardisierte KPIs, Dashboards für TPPs), \nklarere Haftungsregeln und\
    \ verbesserte SCA. Parallel entsteht die **Financial Data Access Regulation (FIDA)**\
    \ als Rahmen für Open Finance, inklusive Zugriff auf Anlagen, Kredite und Versicherungen.\
    \ [fabrick](https://www.fabrick.com/en-gb/insights/blog/open-banking-2026-trends/)\n\
    \n## Technische Umsetzung (APIs und Standards)\n\nOpen Banking APIs folgen **RESTful-Architektur**\
    \ mit JSON-Nachrichten (ISO 20022-basiert), OAuth 2.0 für Token-Management und\
    \ MTLS (mutual TLS) für TPP-Authentifizierung. Endpoints umfassen typischerweise\
    \ \n`/accounts`, `/transactions`, `/balances` (AIS) und `/payments` (PIS). [openbankingtracker](https://www.openbankingtracker.com/open-banking-api)\n\
    In Europa dominiert der **Berlin Group NextGenPSD2**-Standard (Version 2.0+),\
    \ ein offener, interoperabler Framework, der in Deutschland weit verbreitet ist\
    \ und Erweiterungen wie PIIS (Payment Instrument Issuer Services) \nintegriert.\
    \ Er reduziert Fragmentierung gegenüber UK-Open-Banking- oder STET-Standards.\
    \ [arb](https://www.arb.ro/wp-content/uploads/FSFD-Editia-1-2018-Ortwin-Scheja-Berlin-Group-1.pdf)\n\
    Banken müssen **Dedicated Interfaces** bereitstellen, parallel zu bestehenden\
    \ Systemen; TPPs erhalten eIDAS-QWAC/QSealC-Zertifikate für sichere Verbindungen.\
    \ Rate-Limits, Idempotenz-Keys und Retry-Mechanismen \ngewährleisten Resilienz.\
    \ [byteandrise](https://byteandrise.com/blog/open-banking-open-finance-what-s-coming-in-2026/)\n\
    \n## Aktueller Stand in Deutschland und Europa\n\nIn Deutschland ist PSD2 vollständig\
    \ implementiert, mit hoher TPP-Adoption (über 1.000 lizenzierte TPPs EU-weit,\
    \ viele in DACH). Die BaFin überwacht Compliance; große Banken wie Sparkassen\
    \ und Volksbanken \nbieten NextGenPSD2-APIs an. [coredo](https://coredo.eu/open-banking-in-2026-changes-in-licensing/)\n\
    Europa-weit variiert die Reife: UK und Skandinavien führen mit Premium-APIs, während\
    \ Südeuropa aufholt. Aggregatoren wie Tink verbinden Fintechs mit >3.000 Banken;\
    \ Marktvolumen für Open-Banking-Dienste \nwächst auf >10 Mrd. € bis 2026. [noda](https://noda.live/articles/top-open-banking-api-providers)\n\
    Banken stellen zunehmend **Backend-APIs** über PSD2-Minimum hinaus zur Verfügung\
    \ (z.B. für Karten, Identität), oft als \"Premium APIs\" monetarisiert. [byteandrise](https://byteandrise.com/blog/open-banking-open-finance-what-s-coming-in-2026/)\n\
    \n## Ausblick auf Non-EU Länder\n    \n**Vereinigtes Königreich**: Pionier seit\
    \ 2018 (CMA9 Open Banking Standard), ca. 9 Mio. aktive Nutzer (2024), Weiterentwicklung\
    \ zu Open Finance unter dem JROC\n    \n**USA:** Marktgetrieben; CFPB Section\
    \ 1033 Rule verpflichtet ab 2026 schrittweise Finanzinstitute zur Datenweitergabe\n\
    \    \n**Australien:** Consumer Data Right (CDR) seit 2020, Ausweitung auf Energie\
    \ und Telekommunikation\n    \n**Brasilien:** Eines der umfassendsten Frameworks\
    \ weltweit – Open Finance seit 2021 inkl. Kredite, Investitionen, Versicherungen\n\
    \    \n**Singapur / Asien:** Freiwillige API-Standards (MAS); \n\n**Japan und\
    \ Südkorea:** gesetzliche Öffnungspflichten\n\n## Vorteile für TPPs und Banken\n\
    \nTPPs realisieren **eigene Frontends** mit spezialisierten Funktionen (z.B. Multibanking-Apps,\
    \ Echtzeit-Cashflow-Analyse), ohne Banken für UI-Entwicklung zu belasten. Komplexe\
    \ Frontends entfallen bei \nBanken, die sich auf Core-Banking fokussieren. [ronasit](https://ronasit.com/blog/how-to-use-open-banking-apis-for-innovative-european-fintech-products/)\n\
    Neue Services wie automatisierte Budgetierung, KMU-Finanztools oder Pay-by-Bank\
    \ entstehen, die Banken bisher ignorierten – alles consent-basiert mit expliziten\
    \ Einwilligungsquittungen. [fabrick](https://www.fabrick.com/en-gb/insights/blog/open-banking-2026-trends/)\n\
    \n## Zukünftige Entwicklungen (2026+)\n\n**PSD3/PSR (2026 rollout)**: Verpflichtende\
    \ API-Performance (z.B. <400ms Response), einheitliche Logging/Forensik, verbesserte\
    \ SCA und Haftung (Bank haftet primär bei Ausfällen). Übergang zu \n**einheitlicher\
    \ Open-Finance-Lizenz**. [jpmorgan](https://www.jpmorgan.com/insights/payments/operations-optimization/psd3)\n\
    **FIDA/Open Finance**: Erweiterung auf Savings, Investments, Insurance – APIs\
    \ für Portfolio-Daten, Risikoanalysen. Phasierte Einführung: Zuerst Zahlungen,\
    \ dann Anlagen. [coredo](https://coredo.eu/open-banking-in-2026-changes-in-licensing/)\n\
    **Technische Trends**: AI-gestützte Agents für automatisierte Zahlungen/Switches,\
    \ Embedded Finance (z.B. Zahlungen in E-Commerce), bessere Resilienz (Idempotenz,\
    \ Observability). Premium-APIs mit \nMonetarisierung (z.B. pro Call). [byteandrise](https://byteandrise.com/blog/open-banking-open-finance-what-s-coming-in-2026/)\n\
    Herausforderungen: Datenschutz (DPIA-Pflichten), Interoperabilität und Regulierung\
    \ von AI in Finanzdaten. [coredo](https://coredo.eu/open-banking-in-2026-changes-in-licensing/)\n\
    \    \n## Use Cases für unser Unternehmen\n\n**Kartengeschäft**\n    \n- Hybride\
    \ Zahlungsprodukte: Kombination von Karten- und A2A-Zahlungen in einer Produktfamilie;\
    \ Kunden wählen situativ das günstigere Instrument.\n- Datenbasiertes Kreditscoring:\
    \ Bonitätsprüfung auf Basis von Echtzeit-Kontodaten (AISP) für bessere Kreditentscheidungen\
    \ und geringere Ausfallrisiken.\n- Instant Issuing / Virtuelle Karten: Verknüpfung\
    \ mit Open-Banking-Identitätsdaten für schnellere und sicherere Kartenausgabe.\n\
    \    \n**Zahlungsverkehr**\n    \n- Premium-API-Dienste für Firmenkunden: Vermarktung\
    \ eigener APIs als kostenpflichtigen Service (Datenabruf, Kontoinformationen,\
    \ Zahlungsinitiierung) im Rahmen des SPAA-Schemes.\n- Account-to-Account-Zahlungen\
    \ (A2A): Direkte Zahlungsinitiierung ohne Kartenintermediation – insbesondere\
    \ für E-Commerce-Partner attraktiv.\n- Multibank-Cash-Management: Aggregation\
    \ von Konten verschiedener Banken für Firmenkunden zur zentralen Liquiditätssteuerung.\n\
    - Request to Pay (RtP): Integration des EPC-RtP-Standards für digitale Rechnungsstellung\
    \ und Inkasso.\n    \n**Online- & Mobile Banking**\n    \n- Account Aggregation\
    \ / Financial Dashboard: Konsolidierte Darstellung aller Konten des Kunden (auch\
    \ bei Fremdbanken) in einer App – stärkt Kundenbindung und Verweildauer.\n- Personal\
    \ Finance Management (PFM): KI-gestützte Ausgabenanalyse, Budgetplanung und Sparziele\
    \ auf Basis kategorisierter Transaktionsdaten.\n- Embedded Finance: Integration\
    \ von Bankfunktionen (Kredite, Versicherungen, Sparprodukte) in Drittanbieter-Ökosysteme\
    \ oder Bereitstellung der eigenen Plattform als Banking-as-a-Service (BaaS).\n\
    - Onboarding & KYC: Nutzung von Open-Banking-Daten zur automatisierten Identitäts-\
    \ und Bonitätsprüfung bei Neukunden."
