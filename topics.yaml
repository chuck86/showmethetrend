  priority: High
  horizon: 12–24 months
  management_summary:
    summary: "## Aktueller Stand\n\nDie überarbeitete Verordnung (EU) 2024/1183 wurde\
      \ am 30. April 2024 im EU-Amtsblatt veröffentlicht und trat am 20. Mai 2024\
      \ in Kraft. Die Implementierung \nerfolgt phasenweise. Erste Wallet-Funktionalitäten\
      \ wurden ab September 2024 in den Mitgliedstaaten integriert, die Kernvertrauensdienste\
      \ sollten bis Ende 2025 vollständig \nbetriebsbereit sein. Cclab Bis September\
      \ 2026 sind alle EU-Mitgliedstaaten verpflichtet, die EUDI Wallet für ihre Bürger\
      \ bereitzustellen. UTIMACO Deutschland plant die \nBereitstellung einer Beta-Version\
      \ Ende 2026 oder Anfang 2027.\n\n## Strategische Bedeutung\n\neIDAS 2.0 definiert\
      \ eine neue Baseline für digitale Vertrauensdienste in Europa. Für Banken, Versicherungen\
      \ und Fintechs verbindet sich das Zusammenspiel aus AMLR, eIDAS 2.0 \nund der\
      \ operativen Einführung der EUDI Wallet zu einer neuen Grundlage für Vertrauen,\
      \ Sicherheit und Nutzererfahrung im digitalen Finanzökosystem. KYC-Prozesse,\
      \ \nStrong Customer Authentication (SCA) und digitales Onboarding müssen auf\
      \ die neuen Standards ausgerichtet werden. Für Unternehmen in regulierten Sektoren\
      \ – darunter Banken und \nFinanzdienstleister – entstehen konkrete Compliance-Pflichten:\
      \ Sie müssen digitale Nachweise via EUDI Wallet akzeptieren, EU-definierte Sicherheitsniveaus\
      \ erfüllen und ihre \nSysteme mit den aktuellen Implementing Acts in Einklang\
      \ bringen. \n\n## Handlungsempfehlungen\n\n- Gap-Analyse bestehender Identifizierungs-,\
      \ Onboarding- und Signaturprozesse\n- Frühzeitige Positionierung/Ausnutzen der\
      \ bestehenden Positionieren als Trust Service Provider im EUDI-Wallet-Ökosystem\n\
      - Teilnahme an Pilotprogrammen und Sandbox-Umgebungen zur Risiko- und Chancenbewertung\
      \ vor dem operativen Druck 2026/2027\n- Laufendes Monitoring der Implementing\
      \ Acts der EU-Kommission"
    strategic_importance: ''
    course_of_action: ''
  management_summary_en: "eIDAS 2.0 is primarily a compliance topic in the near term\
    \ but carries a genuine commercial opportunity: qualifying \nas a Trust Service\
    \ Provider positions the bank as a core infrastructure player in the EU digital\
    \ identity ecosystem. The investment \nrequired is moderate and largely overlaps\
    \ with existing eKYC infrastructure. \nHuge potential (in theory at least). NCS\
    \ already posesses (at least in large parts) the necessary infrastructure. Obligation\
    \ to accept eIDAS \nidentification creates pressure to implement."
  description: "eIDAS 2.0 ist die überarbeitete EU-Verordnung für elektronische Identifikation\
    \ und Vertrauensdienste, die am 20. Mai 2024 in Kraft trat und die Verordnung\
    \ von 2014 erheblich \nerweitert. Anders als die ursprüngliche eIDAS-Verordnung,\
    \ bei der nationale eID-Systeme freiwillig waren, verpflichtet eIDAS 2.0 alle\
    \ 27 EU-Mitgliedstaaten, Bürgern und Unternehmen \nauf Verlangen eine digitale\
    \ Identitäts-Wallet bereitzustellen. \nQualified-electronic-signature Das Rahmenwerk\
    \ standardisiert digitale Identitäten, qualifizierte elektronische Signaturen\
    \ und Vertrauensdienste auf EU-Ebene und schafft so eine \ngrenzüberschreitend\
    \ interoperable Infrastruktur. Für Banken sind insbesondere die Auswirkungen auf\
    \ KYC-Prozesse, SCA und das digitale Onboarding zentral, da eIDAS 2.0 in direkter\
    \ \nWechselwirkung mit der Anti-Money-Laundering Regulation (AMLR) steht."
  description_en: "The revised eIDAS regulation establishes a mandatory framework\
    \ for cross-border digital identity recognition across all EU \nmember states,\
    \ creating both compliance obligations and a strategic opportunity to act as identity\
    \ service provides. \neIDAS comprises solutions for signatures, seals, timestamps,\
    \ identification (eID, video-ident, etc.), further development to fulfill \nclients\
    \ workflows and process requirements - B2C relevance."
  extended_description: "## Regulatorik & Zeitplan\n\nDie Verordnung (EU) 2024/1183\
    \ ist seit dem 20. Mai 2024 in Kraft; ihre Bestimmungen werden schrittweise bis\
    \ 2026 anwendbar. Neue Anforderungen für die Fernidentifizierung nach Art. \n\
    24 und dem Standard ETSI TS 119 461 werden ab Mai 2026 verpflichtend Namirial\
    \ – betroffen sind insbesondere Qualified Trust Service Provider (QTSPs), die\
    \ qualifizierte Zertifikate \nremote ausstellen. Das Ziel der EU ist eine aktive\
    \ Adoptionsrate von 80 % bis 2030. UTIMACO\n\n## Inhaltliche Schwerpunkte\n\n\
    eIDAS 2.0 führt die EUDI Wallet als zentrales Instrument ein (siehe separates\
    \ Kapitel). Darüber hinaus modernisiert die Verordnung das gesamte Vertrauensdienstökosystem:\
    \ Qualifizierte \nElektronische Signaturen (QES), qualifizierte Siegel, Zeitstempel\
    \ und Archivierungsdienste werden auf neue Sicherheitsstandards gehoben. Für Banken\
    \ sind die Überschneidungen mit AMLR \nund der EUDI Wallet besonders relevant:\
    \ Compliance-Teams müssen ihre Verpflichtungen über beide Rahmenwerke hinweg abbilden,\
    \ prüfen, wo Prozesse sich überschneiden, und erkunden, wo n\neue Vertrauensdienste\
    \ Mehrwert schaffen können, statt lediglich Kosten zu verursachen. \n\n## Deutschland\
    \ im EU-Kontext\n\nAuf dem European Summit on Digital Sovereignty haben mehr als\
    \ 75 Unternehmen – darunter Vertreter aus Banken, Handel, Mobilität, Cybersicherheit\
    \ und Telekommunikation – ein Memorandum \nof Understanding zur erfolgreichen\
    \ Einführung der EUDI Wallet unterzeichnet. The Paypers Die Bundesagentur SPRIND\
    \ demonstrierte bereits eine Beta-Version der deutschen EUDI Wallet; die \nfinale\
    \ Version ist für Ende 2026 oder Anfang 2027 geplant. Die Deutsche Kreditwirtschaft\
    \ treibt Use Cases wie die Kontoeröffnung per Wallet und die Kombination von Altersverifikation\
    \ \nmit Zahlungsinitiation aktiv voran.\n\n## Technische Aspekte\n\nFür Technologieanbieter\
    \ und Organisationen sollte die Auswahl von Plattformen und Vendoren auf die Alignment\
    \ mit dem EU Architecture and Reference Framework (ARF) für EUDI Wallets und \n\
    den eIDAS-2.0-Technologiestandards ausgerichtet sein. EveryCRED Relevante Standards\
    \ umfassen W3C Verifiable Credentials, OpenID4VCI/OpenID4VP, SD-JWT sowie die\
    \ EUCC-Zertifizierung. Für \nBanken als Relying Parties sind konforme Authentifizierungsflows,\
    \ die Unterstützung selektiver Offenlegung und die Integration in nationale Wallet-Frameworks\
    \ erforderlich.\n\n## Strategische Bedeutung & Handlungsempfehlungen\n\nFür zentrale\
    \ IT-Dienstleister im Bankensektor eröffnet eIDAS 2.0 die Möglichkeit, Vertrauensdienste,\
    \ Identifizierungsinfrastruktur und QES-Lösungen als mandantenfähige Plattformdienste\
    \ \nanzubieten und damit einen signifikanten Wettbewerbsvorteil aufzubauen. Wer\
    \ jetzt gezielt Erfahrungen sammelt, kann Compliance-Risiken besser einschätzen\
    \ und gleichzeitig Marktpotenziale \nerschließen – denn die Deadlines für 2026\
    \ und 2027 lassen wenig Zeit."
  extended_description_en: "eIDAS 2.0 (Regulation 910/2014 revised) harmonises digital\
    \ identity trust levels across the EU, requiring member states \nto recognise\
    \ each other's notified eID schemes at all assurance levels. For banks, the most\
    \ relevant changes are: mandatory acceptance of \neIDAS-compliant digital identities\
    \ for KYC purposes, new obligations around qualified electronic signatures and\
    \ seals, and the opportunity \nto register as a qualified Trust Service Provider\
    \ (QTSP). QTSPs can offer electronic signature, timestamp, and identity verification\
    \ services \ncommercially. The regulation also creates a framework for attribute\
    \ attestation services — banks could issue certified financial attribute \nattestations\
    \ (income, account ownership) that third parties can verify without direct data\
    \ access, a privacy-preserving model with significant \ncommercial potential."
  risks:
  - |-
    QTSP certification process is complex and time-consuming; underestimating the timeline risks missing early market positioning.
  - Cross-border eID recognition may enable EU-wide identity providers to compete
    in German KYC market.
  - |-
    Technical interoperability with diverse national eID systems (e.g. Italian SPID, French FranceConnect) requires significant integration work.
  - |-
    Liability framework for eIDAS-certified identity assertions is still being interpreted in the context of AML obligations.
  chances:
  - |-
    Increase in sales by leveraging NCS usp. Usability for GWG and flexibility in combinung NCS solutions
  - |-
    QTSP status enables fee-generating identity verification and electronic signature services for corporate and retail clients.
  - |-
    Certified financial attribute attestations create a new data product that commands premium pricing from third-party verifiers.
  - |-
    Early QTSP positioning creates barriers to entry for non-bank identity competitors in the German financial sector.
  - |-
    eIDAS 2.0 compliance overlaps significantly with EUDI Wallet relying party requirements, reducing total integration cost.
  - Growth in customer range. Growth in market potential (e.g. eGov)
