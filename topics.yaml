  - id: 7
    title: "FIDA - Financial Data Access Regulation"
    category: Banking Regulatory and Trends
    score: 2
    priority: Low-Medium
    horizon: 12–30 months
    description: "The Financial Data Access (FIDA) regulation goes significantly beyond PSD2, mandating data sharing across savings, \
   \ investments, insurance, and pension products. Banks face both defensive obligations and offensive data product opportunities."
    management_summary: "FIDA represents the largest expansion of open banking obligations since PSD2. The compliance burden is real \
   \ but manageable if we treat it as an architecture investment rather than a point solution. The commercial upside — acting as a \
   \ data hub for the full customer financial profile — is substantial and should drive the product roadmap.\n \
   \ TBD ."
    extended_description: "FIDA (Financial Data Access Regulation) was proposed by the European Commission in June 2023 as part of the \
   \ retail financial services strategy. It mandates data sharing for savings accounts, investments, insurance, occupational pensions, \
   \ and mortgage data — all currently outside PSD2 scope. Financial data sharing schemes (FDSS) must be established by industry, with \
   \ a fallback regulatory standard if industry fails to agree. The permission framework introduces customer dashboard requirements: \
   \ customers must have a single interface to manage all data sharing consents across institutions. For banks, FIDA creates a dual role: \
   \ as a data holder (mandatory sharing obligations) and as a data user (ability to access customer data held at other institutions \
   \ for value-added services). The data user opportunity — aggregating a complete customer financial picture for advisory, lending, \ 
   \ and personalisation — is the primary commercial case."
    risks:
      - |-
        FIDA compliance requires significant API and consent management infrastructure investment across all product lines.
      - |-
        Competitive risk: FIDA enables fintechs and big tech to access our customer's complete financial profile at negligible marginal cost.
      - |-
        Data quality obligations under FIDA require ongoing governance of data accuracy across legacy systems.
      - |-
        FDSS governance negotiations may produce unfavourable technical standards that increase our compliance cost.
    chances:
      - |-
        FIDA data user rights enable us to aggregate a complete financial profile for each customer — the foundation for holistic advisory products.
      - |-
        FIDA-based lending decisioning (using competitor account and investment data) improves credit accuracy and opens new segments.
      - |-
        Early FDSS participation shapes technical standards in our favour and builds relationships with key data ecosystem partners.
      - |-
        Consent dashboard requirement, if implemented well, becomes a customer engagement and upsell touchpoint.
    sources:
      - label: 'European Commission: FIDA Proposal — Full Text'
        url: https://finance.ec.europa.eu/publications/financial-data-access-fida_en
      - label: 'EBA: Open Banking and FIDA Implications'
        url: https://www.eba.europa.eu/regulation-and-policy/payment-services-and-electronic-money
      - label: 'Deloitte: FIDA Impact Assessment for Banks'
        url: https://www2.deloitte.com/de/de/pages/financial-services/articles/fida.html
    tags:
      - infrastructure
    stakeholders:
      - 7
      - 3
      - 4
    actions:
      - description: |-
          Conduct a FIDA scope analysis to identify which product categories and data types fall under new sharing obligations.
        status: open
      - description: Assess current API infrastructure and consent management platform
          for FIDA compliance gaps.
        status: open
      - description: |-
          Define a commercial strategy for acting as a Financial Data Access provider for cross-sell and advisory use cases.
        status: open
      - description: Submit response to EBA/EC consultation on FIDA technical standards.
        status: open
    impacts:
      - API strategy
      - Data sharing obligations
      - Customer consent
      - Competitive data access
    driven_by:
      - FIDA regulation proposal
      - PSD3/PSR framework
      - Data economy policy
    position: Monitor & Prepare
    associated_working_groups:
      - name: Berlin Group
        url: https://www.berlin-group.org
      - name: EBA Open Finance WG
        url: ''
      - name: BdB Arbeitsgruppe Open Banking
        url: ''
  - id: 8
    title: "[UPDATE NECESSARY] PSD3/PSDR und Request to Pay (R2P)"
    category: Banking Regulatory and Trends
    score: 8
    priority: High
    horizon: 6–18 months
    management_summary: |
      PSD3 (Payment Services Directive 3) und PSR (Payment Services Regulation) ersetzen PSD2 und die E-Money-Richtlinie durch einen einheitlichen EU-Rahmen für Zahlungs- und E-Geld-Dienste.

      PSD3 regelt Zulassung und Aufsicht als Richtlinie, PSR operative Pflichten als direkt geltende Verordnung.

      Schwerpunkte sind Betrugsprävention, **stärkere SCA**, Open Banking und **Gebührentransparenz**.

      Anwendung PSR ab 2027, PSD3-Transposition in 18 Monaten.
    description: |
      PSD3 modernisiert den Lizenzrahmen für Zahlungsinstitute und E-Geld-Institute und integriert die bisherige EMD2.

      PSR harmonisiert Verhaltensregeln EU-weit und verhindert nationale Unterschiede aus PSD2-Zeit.

      ## Kernziele
      - Höherer Verbraucherschutz, effektive Betrugsbekämpfung, **Open Finance** statt Open Banking.
      - Betrugsdaten müssen zwischen PSPs geteilt werden, Plattformen haften bei ausbleibender Reaktion.
      - SCA wird **risikobasiert** und barrierefrei, Kunden erhalten Echtzeit-Kontrollfunktionen über Limits.
    extended_description: |
      PSD3 definiert einheitliche **Zulassungsstandards** und Governance-Anforderungen für alle Payment Institutions.
      
      PSR regelt Zahlungsrechte, Ausführungsfristen, Haftung, SCA und **dedizierte APIs** für Drittanbieter.
      
      ## Betrugsprävention 
      
      - PSPs haften bei Social Engineering, müssen Betrugsdaten 5 Jahre speichern und teilen.
      - Verification of Payee (VoP) wird verpflichtend, Plattformen müssen nach Hinweis Betrugsinhalte löschen.
      -  SCA erfordert **adaptives Monitoring** von Transaktionsmustern, Smartphone-only-Lösungen sind unzulässig.
      - Open Banking umfasst Kontoauszüge, Zahlungsinitiierung, Stornofunktionen und Testumgebungen.
      - Kunden steuern über **Dashboards** granular Datenfreigaben an TPPs, Diskriminierung ist verboten.
      
      ## Gebührentransparenz
      
      - Alle Kosten (FX, ATM, Zusatzleistungen) vor Zahlung vollständig darstellen.
      - PSD3/PSR verzahnen sich mit **FIDA** für erweiterte Finanzdaten-Nutzung über Kontodaten hinaus.
      
      ## Zeitplan 
      
      - PSR gilt direkt nach Veröffentlichung +18 Monate, PSD3-Transposition in 18 Monaten.
      - Bestehende Lizenzen gültig während **24-monatiger Übergangsfrist**, dann Re-Lizenzierung erforderlich.
    risks:
      - |-
        PSDR APP fraud liability shift increases our financial exposure for push payment fraud on instant rails.
      - |-
        SCA exemption changes (PSDR) may require updates to our transaction risk analysis models and thresholds.
      - |-
        R2P adoption depends on both creditor and debtor PSP participation; network effects take time to develop.
      - |-
        Competing proprietary A2A payment schemes (PayPal, Klarna) may pre-empt R2P in consumer-facing use cases.
    chances:
      - |-
        R2P enables complete accounts receivable automation for SME and corporate clients — a high-value, sticky treasury product.
      - |-
        R2P for e-commerce checkout is a direct debit replacement with better conversion and lower chargeback exposure.
      - |-
        PSDR's cleaner SCA exemption framework reduces authentication friction for low-risk transactions, improving conversion.
      - Early R2P creditor-side implementation positions us as the leading B2B payment
        bank in the region.
    sources:
      - label: 'EPC: SEPA Request-to-Pay Rulebook v2.0'
        url: |-
          https://www.europeanpaymentscouncil.eu/document-library/rulebooks/sepa-request-pay-srtp-scheme-rulebook
      - label: 'European Commission: PSD3/PSR Proposal'
        url: https://finance.ec.europa.eu/publications/proposal-payment-services-regulation_en
      - label: 'Deutsche Bundesbank: Zahlungsverkehrsbericht 2024'
        url: https://www.bundesbank.de/de/aufgaben/unbarer-zahlungsverkehr/zahlungsverkehr-und-abwicklungssysteme
      - label: 'SZA'
        url: https://www.sza.de/en/thinktank/psd3-psr-eu-payment-services-regulation
      - name: 'finnius'
        url: https://finnius.com/en/eu-proposals-for-psd3-psr-financial-data-access-and-a-digital-euro/
    tags: []
    stakeholders:
      - 6
      - 7
      - 3
    actions:
      - description: Track PSDR legislative process and update internal SCA and liability
          policy documentation.
        status: in-progress
      - description: |-
          Build SEPA R2P creditor-side implementation for corporate clients, starting with recurring billing use cases.
        status: open
      - description: |-
          Evaluate R2P for retail use cases (e.g. e-commerce checkout, utility billing) and prepare pilot proposal.
        status: open
      - description: Ensure TPP access infrastructure meets updated PSDR performance and
          availability benchmarks.
        status: open
    impacts:
      - SCA implementation
      - Liability regime
      - Payment initiation services
      - R2P product launch
    driven_by:
      - PSR/PSD3 legislative revision
      - EPC SRTP scheme
      - EBA regulatory mandates
    position: Implement & Shape
    associated_working_groups:
      - name: EPC SRTP WG
        url: https://www.europeanpaymentscouncil.eu
      - name: EBA PSD2 Expert Group
        url: ''
      - name: DK Arbeitsgruppe Zahlungsdienste
        url: ''
