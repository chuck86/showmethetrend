  title: giroAPI
  category: Banking Regulatory and Trends
  score: 6
  priority: Medium
  horizon: 6–24 months
  management_summary:
    summary: "## Aktueller Stand\n\nDie Verbände der Deutschen Kreditwirtschaft (BVR,\
      \ DSGV, VÖB und Bankenverband) haben am 1. Januar 2025 das giroAPI Scheme gestartet\
      \ – europaweit das erste \neinheitliche API-Scheme für Zahlungen und Kontoinformationen.\
      \ Im ersten Beitrittsfenster (Februar 2025) schlossen sich mehrere hundert Institute\
      \ als \nAsset Holder an; der erste Asset Broker wurde im Mai 2025 aktiv, weitere\
      \ folgten im August. Das Sub-Scheme Request-to-Pay ist für 2026 in Planung.\n\
      \n## Strategische Bedeutung\n\ngiroAPI ist die marktgetriebene deutsche Antwort\
      \ auf einen standardisierten Open-Banking-Rahmen, der substanziell über die\
      \ PSD2-Mindestanforderungen \nhinausgeht. Mit der möglichen Einführung von FIDA\
      \ (Financial Data Access Regulation) könnte giroAPI zu einem wichtigen Baustein\
      \ für die zukünftige \nImplementierung europäischer Open-Banking-Initiativen\
      \ werden. Für zentrale IT-Dienstleister bietet das Scheme eine Plattform zur\
      \ Vermarktung \nstandardisierter API-Konnektivität als Managed Service.\n\n\
      ## Handlungsempfehlungen\n\n- Prüfung und Entwicklung giroAPI-basierter Mehrwertdienste\
      \ (insb. Payment with Disposition, Micropayments, Financial Information)\n-\
      \ Frühzeitige Vorbereitung auf das Request-to-Pay Sub-Scheme 2026\n- Strategische\
      \ Kompatibilitätsprüfung mit dem SPAA Scheme der Berlin Group"
    strategic_importance: ''
    course_of_action: ''
  management_summary_en: TBD
  description: "giroAPI ist das seit dem 1. Januar 2025 aktive API-Scheme der Deutschen\
    \ Kreditwirtschaft für standardisierten Kontozugriff in Deutschland. Es basiert\
    \ auf \ndem europaweiten openFinance API Framework der Berlin Group und ermöglicht\
    \ aufsichtlich lizenzierten Drittanbietern, Zahlungen unter Einbeziehung ihrer\
    \ \nKunden kundenfreundlicher zu gestalten sowie Kontoinformationen gezielter\
    \ abzurufen. Voeb Das Scheme hat eine modulare Struktur aus verschiedenen Sub-Schemes\
    \ \nfür Zahlungen, Kontoinformationen und künftig Request-to-Pay sowie Open Finance.\
    \ giroAPI bietet Asset Holders einen zuverlässigen vertraglichen Rahmen für \n\
    die Bereitstellung von API-Geschäftsvorfällen im Bereich Zahlungen und zukünftig\
    \ auch in den Bereichen Open Finance und Request-to-Pay."
  description_en: TBD
  extended_description: "## Hintergrund & Regulatorik\n\ngiroAPI wurde als Initiative\
    \ der Deutschen Kreditwirtschaft ins Leben gerufen, um auf Basis des Berlin-Group-Standards\
    \ ein marktgetriebenes, qualitativ \nhochwertiges API-Ökosystem zu etablieren.\
    \ Es geht bewusst über die PSD2-Pflichtschnittstelle hinaus und bietet Premium-Dienste\
    \ mit definierten \nQualitätsstandards, vertraglichen Rahmenbedingungen und erweiterten\
    \ Funktionalitäten. Der GBIC sieht eine stärkere technische und funktionale Konvergenz\
    \ \nzwischen giroAPI und dem SPAA Scheme (SEPA Payment Account Access) als signifikante\
    \ Möglichkeit, bestehende Investitionen zu sichern und die europäische \nInteroperabilität\
    \ im Open-Banking-Umfeld voranzutreiben. \n\n## Struktur & Funktionalitäten\n\n\
    Das Scheme ist modular aufgebaut:\n\n**Sub-Scheme Payments:** Enthält u.a. Payment\
    \ with Disposition (der Asset Broker darf eine vorab autorisierte Zahlung auslösen\
    \ – der Empfänger kann sicher \nsein, den angeforderten Betrag zu erhalten) und\
    \ Micropayments (Kleinstzahlungen ohne SCA-Eingabe)\n\n**Sub-Scheme Financial\
    \ Information:** Erweiterter Kontozugriff – erstmals können auch Spar-, Kredit-\
    \ und Kartenkonten abgefragt werden, was eine verbesserte \nKontoverwaltung und\
    \ nahtlose Zahlungen ermöglicht \n\n**Geplant 2026:** Sub-Scheme Request-to-Pay\n\
    \n**Perspektivisch:** Open Finance mit Zugriff auf weitere Finanzdaten, insb.\
    \ im Kontext FIDA\n\n## Rollout-Stand\n\nDie Einführung von giroAPI schreitet\
    \ stetig voran: Im Februar 2025 traten die ersten Banken bei, im Mai der erste\
    \ Asset Broker, mit weiteren Asset Brokern \nim August. Die Erweiterung des Payments\
    \ Sub-Schemes um „Multiple Recurring Payments\" war für den Jahreswechsel 2025/2026\
    \ geplant. Die Einführung eines \nweiteren Sub-Schemes mit der Request-to-Pay-Funktion\
    \ ist für 2026 vorgesehen, ohne dass ein konkretes Datum genannt werden kann,\
    \ da giroAPI als \nfortlaufender Entwicklungsprozess verstanden wird. The Paypers\n\
    \n## Technische Aspekte\n\ngiroAPI basiert auf REST-APIs nach dem openFinance\
    \ API Framework der Berlin Group, ergänzt um klare technische Appendices. Die\
    \ Authentifizierung erfolgt \nnach OAuth2/OIDC-Standards mit PSD2-konformer SCA\
    \ (außer bei Micropayments). Das Scheme steht sowohl europäischen Banken als auch\
    \ Asset Brokern offen – der \nBeitritt ist direkt oder über einen Verband möglich.\
    \ Die-dk\n\n## Strategische Bedeutung & Handlungsempfehlungen\n\ngiroAPI eröffnet\
    \ Möglichkeiten, die weit über die bloße Erfüllung gesetzlicher PSD2-Anforderungen\
    \ hinausgehen: Der Fokus liegt auf der Schaffung von \nMehrwertdiensten, die sowohl\
    \ für Drittanbieter als auch für Kunden greifbare Vorteile bieten. The Paypers\
    \ Für zentrale IT-Dienstleister im Bankensektor \nbedeutet dies eine Plattformchance:\
    \ Standardisierte API-Konnektivität als Managed Service für angeschlossene Institute\
    \ anzubieten und damit frühzeitig \nein zentrales Element der deutschen und europäischen\
    \ Open-Finance-Infrastruktur zu besetzen."
