  - id: 2
    title: girocard 4.0
    category: Digital Payments
    score: 6
    priority: High
    horizon: 12–24 months
    description: "The girocard scheme is undergoing a fundamental modernisation to support\
    \ contactless mobile payments, NFC-based wallets, and online e-commerce use \n\
    cases. girocard 4.0 introduces a new technical architecture enabling tokenisation\
    \ and digital wallet integration."
    management_summary: "girocard 4.0 is the most significant scheme modernisation since\
    \ the introduction of contactless. Failure to migrate on time risks exclusion\
    \ from \nApple Pay and Google Pay wallet ecosystems, which are now primary payment\
    \ interfaces for under-40 demographics. Migration investment is non-negotiable;\
    \ \nthe commercial opportunity lies in wallet-native product features.\nCurrently\
    \ some banks are already provide their customers with in-app girocard transactions\
    \ (android and iOS)"
    extended_description: "The girocard 4.0 initiative, driven by Deutsche Kreditwirtschaft,\
    \ replaces the proprietary girocard EMV kernel with a new tokenisation-capable\
    \ \narchitecture supporting Apple Pay, Google Pay, and German OEM wallet integrations,\
    \ theirby (as a side-effect) also strengthening the national \npayment infrastructure\
    \ (while reducing dependency from major international schemes) The scheme also\
    \ introduces an e-commerce capability, addressing \nthe longstanding gap where\
    \ girocard could not be used for online purchases without a co-badged scheme (Maestro,\
    \ now being phased out). Token \nService Provider (TSP) integration is required\
    \ at the issuer level; banks using Atruvia processing benefit from a shared migration\
    \ path, but \nindependent processors must implement TSP connectivity separately.\
    \ \nEURO Kartensysteme GmbH is acting as scheme manager, providing a roadmap.\n \
    \ Girocard 2.0: e-commerce and in-app-transactions; \n girocard 3.0: e- and app-payments;\n \
    \ girocard 4.0: convenience and added value.\nThe scheme timeline envisions full\
    \ migration by end of 2026 with a transition period through 2027. \nThis planed\
    \ extension closes a functional gap that is offered by (for instance) credit card\
    \ schemes (rental car reservation, hotel booking, integration \nin third party\
    \ wallets, in-app payments)."
    risks:
      - High investmens in technology. Training necessary.
      - |-
        Dense market: international schemes are already established. Market capitalization more difficult. Only relevant for german market.
      - |-
        Migration delay risks exclusion from Apple Pay and Google Pay wallet integrations, ceding market share to Visa/Mastercard debit.
      - |-
        TSP integration complexity may be underestimated, particularly for banks with legacy issuing systems.
      - Scheme fee structure under girocard 4.0 is not yet finalised; cost increase is
        possible.
      - |-
        Merchant acquirer readiness varies; incomplete terminal estate upgrades could fragment the acceptance network.
    chances:
      - |-
        girocard mobile wallet integration recaptures digital payment share from Visa/Mastercard among German debit cardholders
      - |-
        E-commerce capability opens a new acceptance channel for girocard, previously absent from online retail.
      - |-
        Tokenisation infrastructure is reusable for Digital Euro distribution and future CBDC wallet integration.
      - |-
        Strengthened domestic scheme reduces interchange exposure and keeps payment data within the German banking ecosystem.
      - Business modell expansion by offering new services based on new technical possibilities
    sources:
      - label: 'Deutsche Kreditwirtschaft: girocard 4.0 Programme'
        url: https://die-dk.de/zahlungsverkehr/girocard/
      - label: 'Bundesbank: Retail Payments Strategy Germany'
        url: https://www.bundesbank.de/en/tasks/payment-systems/retail-payments
      - label: 'Atruvia: girocard Migration Documentation (internal)'
        url: '#'
    tags:
