- id: 6
  title: EUDI Wallet
  category: Trusted Services
  score: 9
  priority: High
  horizon: 18–36 months
  management_summary:
    summary: |-
      ## Aktueller Stand

      Die EUDI Wallet ist das Kernelement von eIDAS 2.0: Jeder EU-Bürger und jedes Unternehmen erhält Zugang zu einer anerkannten und interoperablen digitalen Identität, die in allen Mitgliedstaaten einsetzbar ist. Signaturit Großangelegte Pilotprogramme (Large Scale Pilots) laufen seit 2023. Bis September 2026 sind alle EU-Mitgliedstaaten zur Bereitstellung verpflichtet. UTIMACO In Deutschland ist die Beta-Version für Ende 2026/Anfang 2027 geplant. Das hohe Interesse an einer Umsetzung wurde durch eine entsprechende Priorisierung von Kommission, PÜarlament und Rat im April 2026 bestärkt.

      ## Strategische Bedeutung

      Die EUDI Wallet wird das digitale Identifikationsparadigma in Europa grundlegend verändern. Die Wallet schafft einfachere grenzüberschreitende Geschäfte, schnellere Onboarding-Prozesse, optimierte KYC/AML-Compliance und eine verbesserte Vertrauens- und Kundenerfahrung. Signaturit Für Banken entstehen gleichzeitig neue Rollen: als Relying Party (Akzeptanz von Wallet-Nachweisen), als Attribute Provider (Ausgabe bankrelevanter Nachweise) und potenziell als qualifizierter Vertrauensdiensteanbieter.

      ## Handlungsempfehlungen

      Vorbereitung der Systeme auf die Wallet-Akzeptanz als Relying Party (Onboarding, KYC, SCA)
      Exploration der Attribute-Provider-Rolle (z.B. IBAN-Zertifikat, Legal Person Identifier)
      Laufendes Monitoring der nationalen Umsetzungszeitpläne und der Implementing Acts der EU-Kommission
      Pilotteilnahme als strategische Investition nutzen, bevor operativer Compliance-Druck entsteht
    strategic_importance: ''
    course_of_action: ''
  management_summary_en: "The European Digital Identity Wallet will provide EU citizens\
    \ with a standardised digital wallet for identity \ncredentials, payment initiation,\
    \ and document storage. Member states must offer a wallet by 2026. It is currently\
    \ moving faster \nthan anticipated. The large-scale pilots are producing concrete\
    \ technical outputs, and the 2026 member state deadline is credible. "
  description: |-
    Die EUDI Wallet (European Digital Identity Wallet) ist eine staatlich bereitgestellte Anwendung, die EU-Bürgern ermöglicht, digitale Identitätsnachweise und Attribute sicher zu speichern und datenschutzkonform – durch selektive Offenlegung – an Dritte weiterzugeben. Sie ermöglicht es, Identität zu beweisen, ohne unnötige Daten preiszugeben – etwa das Alter nachzuweisen, ohne Geburtsdatum oder vollständigen Namen offenzulegen. Qualified-electronic-signature Als Kernelement der eIDAS-2.0-Verordnung müssen alle EU-Mitgliedstaaten bis September 2026 mindestens eine konforme Wallet bereitstellen. Für Banken ist die Wallet sowohl als Relying Party (Nutzung von Wallet-Nachweisen für KYC und Onboarding) als auch als potenzielle Attribute-Quelle strategisch relevant.
  description_en: "The European Digital Identity Wallet will provide EU citizens with\
    \ a standardised digital wallet for identity credentials, payment initiation,\
    \ and document storage. Member states must offer a wallet by 2026. Opens door\
    \ for (new) digital processes - for corporations too (see European business Wallet\
    \ EUBW). \n- Usage for the user will be free. \n- Longterm project with unclear\
    \ outcome \n- independant ID procedure offering multiple trust levels \n- Acceptance\
    \ is mandatory (at least in certain cases)."
  extended_description: "## Regulatorik & Zeitplan\n\nRechtsgrundlage ist Regulation\
    \ (EU) 2024/1183 (eIDAS 2.0), Art. 5a. Die EU-Kommission hat seit November 2024\
    \ schrittweise technische Spezifikationen und \nImplementing Acts veröffentlicht;\
    \ im Juni 2025 wurde ein weiteres Paket von Implementing Acts zur öffentlichen\
    \ Konsultation vorgelegt, das technische \nSpezifikationen für Trusted Lists,\
    \ Akkreditierungsregeln und Risikomanagementverfahren definiert. Mit dem Ziel\
    \ einer aktiven Adoptionsrate von 80 % bis \n2030 hat die EUDI Wallet das Potenzial,\
    \ digitale Interaktionen auf dem gesamten Kontinent neu zu definieren. \n\n##\
    \ Funktionalitäten\n\nDie EUDI Wallet stellt folgende Kernfunktionen bereit:\n\
    \n**Speicherung digitaler Nachweise:** Personalausweis, Führerschein, Bildungsabschlüsse,\
    \ Versicherungskarten, berufliche Qualifikationen u.v.m.\n\n**Selective Disclosure:**\
    \ Nur die für eine spezifische Transaktion notwendigen Attribute werden weitergegeben\n\
    \n**Qualifizierte Elektronische Signatur (QES):** Rechtsgültige Fernsignatur direkt\
    \ aus der Wallet\n\n**Grenzüberschreitende Anerkennung:** Interoperable Nutzung\
    \ in allen 27 EU-Mitgliedstaaten\n\n## Technische Aspekte\n\nDie Wallet-Architektur\
    \ basiert auf dem Architecture Reference Framework (ARF) der EU-Kommission. Relevante\
    \ Standards umfassen ISO 18013-5 (mDL), W3C \nVerifiable Credentials, SD-JWT (Selective\
    \ Disclosure JWT) sowie OpenID4VCI und OpenID4VP für Ausstellung und Präsentation\
    \ digitaler Nachweise. Die \nEUCC-Zertifizierung (European Cybersecurity Certification\
    \ Scheme) bietet dabei ein strukturiertes, harmonisiertes Validierungsframework,\
    \ das \ngrenzüberschreitendes Vertrauen und Interoperabilität fördert. \n\n##\
    \ Bedeutung für den Finanzsektor\n\nFür Banken entstehen mehrere strategische\
    \ Rollen:\n\n**Relying Party:** Akzeptanz von Wallet-Nachweisen für Onboarding,\
    \ KYC und SCA\n\n**Attribute Provider:** Ausgabe bankrelevanter Nachweise (IBAN-Zertifikat,\
    \ Legal Person Identifier)\n\n**Trust Service Provider:** Bereitstellung qualifizierter\
    \ Zertifikate für QES via Wallet\n\nDie Sparkassen-Finanzgruppe etwa präsentiert\
    \ Szenarien, bei denen Altersverifikation und Zahlungsinitiation in der EUDI Wallet\
    \ kombiniert werden; parallel \ndazu wurde die Kontoeröffnung per Wallet-Beta\
    \ in Deutschland bereits demonstriert. The Paypers Das Zusammenspiel mit der AMLR\
    \ (Anti-Money-Laundering \nRegulation, anwendbar ab 2027) ist besonders kritisch:\
    \ Die EUDI Wallet kann als anerkanntes Identifikationsmittel für AMLR-konforme\
    \ KYC-Prozesse eingesetzt \nwerden.\n\n## Non-EU-Perspektive\n\nErste Gespräche\
    \ über Kompatibilität mit vergleichbaren Initiativen außerhalb der EU (UK Digital\
    \ Identity and Attributes Trust Framework, US NIST-Standards) \nfinden statt.\
    \ Eine gegenseitige Anerkennung ist kurzfristig nicht zu erwarten, bietet jedoch\
    \ mittelfristig Exportpotenzial für europäische \nTechnologieanbieter.\n\n## Strategische\
    \ Empfehlungen\n\nWer jetzt gezielte Erfahrungen sammelt, kann Compliance-Risiken\
    \ besser einschätzen und gleichzeitig Marktpotenziale identifizieren – bevor der\
    \ operative \nDruck durch die 2026/2027-Deadlines zunimmt. The Paypers Für zentrale\
    \ IT-Dienstleister bietet sich die Chance, mandantenfähige Lösungen für \nWallet-Integration,\
    \ Relying-Party-Infrastruktur und Attribute-Ausstellung als Plattformdienst anzubieten."
  extended_description_en: "The EUDI Wallet Architecture and Reference Framework (ARF)\
    \ defines a standardised mobile wallet enabling citizens to  store and present\
    \ identity attributes,\ndocuments, and credentials across borders within the EU.\
    \ For banks, the primary interaction model is as a relying party: \naccepting\
    \ EUDI Wallet credentials for KYC, account opening, and strong customer authentication\
    \ instead of proprietary identity verification \nflows. Banks may also act as\
    \ attestation providers, issuing certified financial credentials (e.g. proof of\
    \ bank account ownership, income \ncertification) into citizen wallets. The four\
    \ large-scale pilots (POTENTIAL, EWC, DC4EU, NOBID) are producing reference implementations\
    \ \nacross healthcare, travel, education, and finance. The financial pilot (EWC)\
    \ is most directly relevant and is testing bank-issued PID attributes \nin payment\
    \ and onboarding scenarios. \n\nIt is one of the most important initiatives of\
    \ the EU on its way to digital sovereignty of its citizens. \n\n- storage of official\
    \ documents such as national id, drivers licence, certificats,... \n- offers comfortable\
    \ way for identification, login to services or digital signatures \n- high security\
    \ standard compared to physical documents \n- user has complete control regarding\
    \ usage of his/her data. Only necessary information is exchanged (privacy by design)\
    \ \n- all eu member states must offer a wallet by end of 2026. Rollout in Germany\
    \ planed for start of 2027. \n- based on eIDAS 2.0. \n\nBanks (and other corporations)\
    \ must offer the usage of EUDI Wallet for \n\n- Online banking account opening\
    \ \\n - Online banking log-in \n- Online banking transactions if the customer\
    \ agrees by december 2027.\n\nThe European Business Wallet (EUBW) was proposed\
    \ by the EU Commission in november 2025. Enabling corporations to digitize their\
    \ \nprocesses and interactions. Corporations can \n\n- sign documents digitally,\
    \ with timestamp and seal \n- securely create, save and exchange verified documents\
    \ with other corporations or public sector (even cross border within the EU).\
    \ \n\nA yearly cost reduction for corporations of 150 bln. EUR is expected."
  risks:
  - |-
    EUDI Wallet adoption speed is uncertain; over-investing in integration ahead of user adoption could result in stranded costs.
  - |-
    Competing wallet ecosystems (Apple Wallet, Google Wallet) may limit EUDI Wallet uptake among tech-savvy demographics.
  - Possible loss of USP of AML-reusage for banks
  - |-
    Privacy-by-design constraints in the wallet architecture may limit the data available to relying parties for AML screening.
  - Possible loss of advantage as german trusted services provider
  chances:
