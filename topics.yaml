  - id: 3
    title: "[UPDATE NECESSARY] Open Banking"
    category: Banking Regulatory and Trends
    score: 5
    priority: Medium
    horizon: 18–30 months
    description: |-
      PSD3 expands the scope of data sharing mandates while introducing new revenue-sharing frameworks. There is a significant opportunity to position as a premium data aggregator for third-party fintechs and corporates.
    management_summary: |-
      Open banking has matured from a compliance obligation into a genuine commercial platform. FIDA will further expand the data scope. The near-term priority is building a developer portal and productising our API layer; longer-term, acting as a premium financial data provider for corporates and fintechs represents a scalable revenue stream.
    extended_description: |-
      PSD2 mandated open banking APIs as a compliance measure; PSD3 and FIDA now create an environment where data sharing is both mandatory and commercially structured. Our current PSD2 API infrastructure has a 97.2% availability rate and serves ~45 active TPPs, but it has not been positioned as a commercial product. The step change required is: first, building a developer portal with sandbox, documentation, and premium API tiers; second, defining data products (cash flow analytics, KYC data, payment initiation bundles) with clear pricing; third, targeting corporate treasurers and fintechs as primary buyer segments. FIDA will add investment, insurance, and pension data to the mandatory sharing perimeter by 2027, multiplying the data asset base significantly.
    risks:
      - |-
        FIDA implementation delays or scope changes could undermine the business case for premium data products.
      - |-
        Data quality and standardisation issues across legacy systems may reduce the value of aggregated data products.
      - |-
        GDPR and data minimisation requirements limit the permissible use cases for monetised financial data.
      - |-
        Large tech platforms (Google, Apple) entering financial data aggregation with superior distribution channels.
    chances:
      - |-
        FIDA creates a legal framework for charging for data access, converting a cost centre into a revenue line.
      - |-
        Corporate treasury clients will pay a premium for enriched, real-time cash flow data and payment initiation APIs.
      - |-
        Positioning as a trusted data intermediary differentiates from pure-play fintechs who lack the institutional trust.
      - |-
        Developer ecosystem around our API portal can accelerate fintech partnership pipeline at low acquisition cost.
    sources:
      - label: 'European Commission: FIDA Proposal'
        url: https://finance.ec.europa.eu/publications/financial-data-access-fida_en
      - label: 'EPC: PSD3 and Open Banking Overview'
        url: |-
          https://www.europeanpaymentscouncil.eu/news-insights/insight/psd3-and-psr-what-changes-are-coming-open-banking
      - label: 'Open Banking Excellence: Market Report 2025'
        url: https://www.openbanking.org.uk/insights/
    tags:
      - payment
      - research
    stakeholders:
      - 5
      - 4
    actions:
      - description: Map consent management architecture against PSD3 requirements.
        status: open
      - description: Identify top-3 data product propositions with clear revenue model
          for enterprise clients.
        status: open
      - description: Build API developer portal with sandbox environment to accelerate
          third-party adoption.
        status: open
    impacts:
      - API infrastructure
      - Data governance
      - Revenue model
      - Customer consent management
    driven_by:
      - PSD3/PSR
      - FIDA regulation
      - Open Finance policy agenda
    position: Explore
    associated_working_groups:
      - name: Berlin Group NextGenPSD2
        url: https://www.berlin-group.org
      - name: EBA Open Finance WG
        url: ''
  - id: 4
    title: Digitaler Euro
    category: Digital Payments
    score: 7
    priority: Medium-High
    horizon: 24–48 months
    description: |-
      The ECB is advancing its Digital Euro project into the preparation phase, targeting a potential launch in the late 2020s. A retail CBDC would fundamentally alter the role of commercial banks in payment flows, customer relationships, and deposit funding.
    management_summary: |-
      The Digital Euro is a structural, long-cycle threat and opportunity that requires early engagement rather than a wait-and-see approach. The holding limit design will determine the disintermediation impact. Banks that participate actively in the intermediary model stand to gain a distribution role; those that disengage risk being bypassed entirely.
    extended_description: |-
      The ECB's Digital Euro preparation phase (launched November 2023) focuses on rulebook development, technical architecture finalisation, and legislative progress. The ECB has proposed a holding limit of €3,000 per citizen to mitigate bank run risk during stress scenarios, though this is subject to legislative negotiation. Commercial banks would act as distributors (onboarding, KYC, wallet provision) under a supervised intermediary model — preserving the customer relationship but introducing a new settlement liability. The primary disintermediation risk is in transactional deposits: if the Digital Euro offers equivalent convenience to a bank account with ECB credit quality, switching costs for consumers decrease significantly. Banks face a structural question: do we proactively shape the distribution model, or minimise investment and react?
    risks:
      - |-
        High holding limits (€3,000+) could trigger significant retail deposit outflows in stress scenarios, threatening funding stability.
      - |-
        If banks are excluded from the distribution layer, the customer relationship migrates to ECB-controlled infrastructure.
      - |-
        Implementation complexity of Digital Euro wallet integration into existing banking apps and core systems.
      - Political and legislative uncertainty may delay or fundamentally alter the Digital
        Euro design.
    chances:
      - |-
        Banks acting as intermediaries retain the customer relationship and earn distribution fees from the ECB.
      - |-
        Digital Euro infrastructure overlaps significantly with girocard 4.0 tokenisation and stablecoin rail investments.
      - Early adopter banks gain influence over the ECB intermediary rulebook design.
      - |-
        Digital Euro wallet integration is a customer engagement opportunity that can be bundled with premium banking services.
    sources:
      - label: 'ECB: Digital Euro Preparation Phase'
        url: https://www.ecb.europa.eu/paym/digital_euro/html/index.en.html
      - label: 'European Parliament: Digital Euro Legislative Proposal'
        url: |-
          https://www.europarl.europa.eu/legislative-train/theme-a-europe-fit-for-the-digital-age/file-digital-euro
      - label: 'BIS: Retail CBDC Design Principles'
        url: https://www.bis.org/cpmi/publ/d174.htm
    tags:
      - payment
      - infrastructure
      - regulation
    stakeholders:
      - 1
      - 6
      - 7
    actions:
      - description: |-
          Monitor ECB preparation phase milestones and publish quarterly internal briefings for senior leadership.
        status: in-progress
      - description: |-
          Model disintermediation scenarios under different holding limit assumptions (€500, €1,000, €3,000) and estimate deposit outflow impact.
        status: open
      - description: Engage via banking association working groups to provide input on
          intermediary model design.
        status: open
      - description: |-
          Prototype a Digital Euro distribution interface aligned with ECB intermediary architecture specifications.
        status: open
    impacts:
      - Deposit base
      - Payment product strategy
      - Customer interface
      - AML obligations
    driven_by:
      - ECB investigation phase
      - EU legislative proposal
      - Disintermediation risk
    position: Monitor & Prepare
    associated_working_groups:
      - name: ECB Digital Euro Market Advisory Group
        url: https://www.ecb.europa.eu/paym/digital_euro/html/index.en.html
      - name: EPC Digital Euro WG
        url: ''
  - id: 5
    title: "eIDAS 2.0"
    category: Trusted Services
    score: 9
    priority: High
    horizon: 12–24 months
    description: "The revised eIDAS regulation establishes a mandatory framework for cross-border digital identity recognition across all EU \
    \ member states, creating both compliance obligations and a strategic opportunity to act as identity service provides. \n \
    \ eIDAS comprises solutions for signatures, seals, timestamps, identification (eID, video-ident, etc.), further development to fulfill \
    \ clients workflows and process requirements - B2C relevance."
    management_summary: "eIDAS 2.0 is primarily a compliance topic in the near term but carries a genuine commercial opportunity: qualifying \
    \ as a Trust Service Provider positions the bank as a core infrastructure player in the EU digital identity ecosystem. The investment \
    \ required is moderate and largely overlaps with existing eKYC infrastructure. \n \
    \ Huge potential (in theory at least). NCS already posesses (at least in large parts) the necessary infrastructure. Obligation to accept eIDAS \ 
    \ identification creates pressure to implement."
    extended_description: "eIDAS 2.0 (Regulation 910/2014 revised) harmonises digital identity trust levels across the EU, requiring member states \
    \ to recognise each other's notified eID schemes at all assurance levels. For banks, the most relevant changes are: mandatory acceptance of \
    \ eIDAS-compliant digital identities for KYC purposes, new obligations around qualified electronic signatures and seals, and the opportunity \
    \ to register as a qualified Trust Service Provider (QTSP). QTSPs can offer electronic signature, timestamp, and identity verification services \
    \ commercially. The regulation also creates a framework for attribute attestation services — banks could issue certified financial attribute \
    \ attestations (income, account ownership) that third parties can verify without direct data access, a privacy-preserving model with significant \
    \ commercial potential."
    risks:
      - |-
        QTSP certification process is complex and time-consuming; underestimating the timeline risks missing early market positioning.
      - Cross-border eID recognition may enable EU-wide identity providers to compete
        in German KYC market.
      - |-
        Technical interoperability with diverse national eID systems (e.g. Italian SPID, French FranceConnect) requires significant integration work.
      - |-
        Liability framework for eIDAS-certified identity assertions is still being interpreted in the context of AML obligations.
    chances:
      - |-
        Increase in sales by leveraging NCS usp. Usability for GWG and flexibility in combinung NCS solutions
      - |-
        QTSP status enables fee-generating identity verification and electronic signature services for corporate and retail clients.
      - |-
        Certified financial attribute attestations create a new data product that commands premium pricing from third-party verifiers.
      - |-
        Early QTSP positioning creates barriers to entry for non-bank identity competitors in the German financial sector.
      - |-
        eIDAS 2.0 compliance overlaps significantly with EUDI Wallet relying party requirements, reducing total integration cost.
      - |-
        Growth in customer range. Growth in market potential (e.g. eGov)
    sources:
      - label: eIDAS 2.0 — EU Regulation 2024/1183
        url: https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32024R1183
      - label: 'ENISA: eIDAS 2.0 Technical Guidelines'
        url: https://www.enisa.europa.eu/topics/eid
      - label: 'BSI: Digital Identity Standards Germany'
        url: |-
          https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Standards-und-Zertifizierung/standards-und-zertifizierung_node.html
    tags:
      - infrastructure
    stakeholders:
