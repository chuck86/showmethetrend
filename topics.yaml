topics:
  - id: 1
    title: "Stablecoins"
    category: Regulatory
    score: 3
    priority: Low
    horizon: 36-60 months
    management_summary: |-
      Stablecoins gewinnen aktuell zunehmend an öffentlichem Interesse. Stablecoin-Zahlungssysteme bieten eine glaubwürdige mittelfristige Alternative für grenzüberschreitende Zahlungen und können die Kosten des Korrespondenzbankwesens potenziell um 30–60 % senken.
      Der MiCA-Rahmen bietet einen regulatorischen Weg in Europa, doch die Zeitpläne sind weiterhin ungewiss. Es besteht die Gefahr, dass Stablecoins andere Produkte, insbesondere im Zahlungsverkehr, verdrängen. Wir können Banken jedoch bei der Integration von Stablecoins 
      unterstützen, wenn wir uns frühzeitig positionieren. Wir empfehlen ein begrenztes Pilotprogramm unter genauer Beobachtung der EZB-Politik.
  
      Die USA treiben die Entwicklung voran und wollen ihre Position stärken. Die EZB wünscht sich eine durchdachte Regulierung. Banken erkennen die Chancen und die Bedeutung der Stablecoin-Technologie und fördern deren Weiterentwicklung (Qivalis).
    management_summary_en: |-
      Stablecoins are currently gaining more public interest. Stablecoin payment rails offer a credible medium-term alternative for cross-border settlement potentially reducing correspondent banking costs by 30–60%. 
      The MiCA framework provides a regulatory pathway in Europe but timelines remain uncertain. It should be noted, that there is a potential danger of stablecoins canibalizing other products including the payment sector. 
      However, supporting Banks in their stablecoin integration if we position ourselfes early on. We recommend a contained pilot programme while monitoring ECB policy closely. 
      
      US is driving further development and want to strengthen their position. ECB wants thought through regulation. Banks see the chances and significance of stablecoin technology and enforce further development (Qivalis).
    description: |-
      ## Stablecoins Übersicht

      Stablecoins sind Kryptowährungen, deren Wert an stabile Vermögenswerte wie US-Dollar oder Euro gebunden ist, im Gegensatz zu volatilen Coins wie Bitcoin. Sie werden durch Reserven (Fiat, Staatsanleihen oder andere Assets) abgesichert und dienen als zuverlässig(er)es Zahlungsmittel im Krypto-Ökosystem.

      ## Wesentliche Eigenschaften

      - **Wertstabilität**: Fiat-gebundene Stablecoins wie USDT (Tether) oder USDC machen **99% des Marktes** aus, Euro-Varianten (EURC) folgen mit <1%.
      - **Primäre Nutzung**: Brücke im Kryptohandel (Krypto → Stablecoin → anderes Krypto), ohne Fiat-Konvertierung; Basis für **DeFi**-Protokolle (Lending, DEX).
      - **Vorteile**: Nahtlose Integration in **Smart Contracts** für automatisierte Zahlungen, z.B. IoT-Geräte; Alternative zu Bankkonten in unterbankten Regionen.

      ## Markt-Adoption

      Finanzdienstleister wie **PayPal** (PYUSD), **Mastercard** (Crypto Card mit Stablecoin-Settlement) und **Qivalis** (société de gestion mit Stablecoin-Produkten) sind aktiv.

      Europa befindet sich in der **frühen Wachstumsphase** – MiCA-Regulierung (seit 2024) schafft Klarheit für **eMoney Stablecoins** (1:1-Reserven).

      Globaler Stablecoin-Markt: >**$200 Mrd.** (Stand 2026), getrieben durch Cross-Border-Zahlungen und **RWA-Tokenisierung** (Real World Assets).

      ## Use Cases

      - **DeFi & Trading**: Liquidität in AMMs (Uniswap), Yield Farming ohne Fiat-Umwege.
      - **Zahlungen**: Sofortüberweisungen (24/7), niedrige Fees vs. traditionelle Rails.
      - **Unternehmen**: Treasury-Management, IoT-Mikrozahlungen via Smart Contracts.
      - **Entwicklung**: Als **Bankkonto-Ersatz** in Schwellenländern; wachsender B2B-Einsatz für Supply-Chain-Finanzierung.
    description_en: |-
      ## Stablecoins Overview
  
      Stablecoins are cryptocurrencies whose value is pegged to stable assets such as the US dollar or euro, unlike volatile coins such as Bitcoin. They are backed by reserves (fiat currency, government bonds, or other assets) and serve as a more reliable means of payment within the crypto ecosystem.
      ## Key Characteristics
      
      - **Value Stability**: Fiat-pegged stablecoins like USDT (Tether) or USDC make up **99% of the market**, with euro-linked versions (EURC) following at <1%.
      - **Primary Use**: Bridge in crypto trading (crypto → stablecoin → other crypto), without fiat conversion; basis for **DeFi** protocols (lending, DEX).
      - **Advantages**: Seamless integration into **smart contracts** for automated payments, e.g., IoT devices; alternative to bank accounts in underbanked regions.

      ## Market Adoption
      
      Financial service providers such as **PayPal** (PYUSD), **Mastercard** (crypto card with stablecoin settlement), and **Qivalis** (management company with stablecoin products) are active.
      
      Europe is in the **early growth phase** – MiCA regulation (since 2024) provides clarity for **eMoney stablecoins** (1:1 reserves).
      
      Global stablecoin market: >**$200 billion** (as of 2026), driven by cross-border payments and **RWA tokenization** (real-world assets).
      
      ## Use Cases
      - **DeFi & Trading**: Liquidity in AMMs (Uniswap), yield farming without fiat intermediaries.
      - **Payments**: Instant transfers (24/7), low fees vs. traditional rails.
      - **Companies**: Treasury management, IoT micropayments via smart contracts.
      - **Developments**: As a **bank account replacement** in emerging markets; growing B2B use for supply chain financing.
    extended_description: |-
      ## Ausführliche Beschreibung
        
      Stablecoins sind **blockchain-basierte Zahlungsmittel**, die **1:1 an Fiat-Währungen** (US-Dollar, Euro) gebunden und/oder durch liquide Assets (z.B. Staatsanleihen) abgesichert sind. 
      Im Gegensatz zu volatilen Kryptowährungen wie Bitcoin dienen sie als **stabile Brücke** innerhalb von Blockchains – ideal zum Parken von Kapital ohne Fiat-Konvertierung oder zum Ausnutzen von **Arbitrage-Chancen** zwischen Börsen.
        
      ## Markt- und Wachstumsdynamik
        
      - **Marktdominanz**: **Tether (USDT)** und **USD Coin (USDC)** kontrollieren **~90%** eines Marktes, der sich in zwei Jahren auf **$225 Mrd.** verdoppelt hat (BIZ-Daten).
      - **Europäischer Markt**: Noch **frühphasig**, MiCA-Regulierung (seit 2024) schafft Rahmen für eMoney-Stablecoins; MiCA-eMoney-Tokens gewinnen an **B2B-Relevanz** bei Fintechs/Unternehmen für **Cross-Border-Zahlungen** (SWIFT-Alternative, **60% Kostensenkung**). Euro-Varianten <1% Marktanteil.
      - **Wachstumstreiber**: Grenzüberschreitender Zahlungsverkehr (**Kostensenkung bis 60%** vs. traditionelle Banken), **DeFi-Anwendungen** (Lending, DEX) und **Smart-Contract-Zahlungen** für IoT.
  
      ## Finanzdienstleister-Engagement
  
      **Traditionelle Player** drängen nach: **PayPal** expandiert **PYUSD** (seit 2023 USA) auf **70 Märkte** inkl. Europa; **Mastercard** übernimmt **BVNK** als Stablecoin-Spezialisten.
  
      Europäisches Konsortium (**Qivalis**, MiCAR-konform unter niederländischer DNB-Aufsicht) mit **11 Banken** (DZ Bank, BNP Paribas, ING, UniCredit u.a.) plant **Euro-Stablecoin**-Launch H2 2026.
        
      ## Regulatorische Rahmenbedingungen
      - **USA (Genius Act)**: Pflicht zu **liquiden US-Assets** (Dollar, T-Bills) sichert Nachfrage nach Staatsanleihen und lockt Emittenten.
      - **Europa (MiCA)**: Strenge 1:1-Reserven, Lizenzpflicht; **Qivalis** (Konsortium mit **DZ Bank, ING, UniCredit** u.a., DNB-reguliert) plant **Euro-Stablecoin** H2 2026.
      - **Risiken (FATF/EZB/BIZ)**: Gefahr illegaler Finanzströme durch lückenhafte Regulierung; **Währungsverdrängung** in Schwellenländern destabilisiert lokale Ökonomien.
              
      ## Implementierungsanforderungen
      
      Banken brauchen **Treasury-Anpassungen**, **Token-Verwahrung**, **AML/CFT** für Off-Chain-Transaktionen.
      Tech-Stack: **Ethereum L2** (Polygon) oder permissioned Chains; offene Fragen zu **Kapital-/Liquiditätsbehandlung**.
      **AUS**: White-Label-**Stablecoin-Settlement-Korridor** als **USP** für Firmenkunden.
    
      ## Erweiterte Use Cases
        
      - **B2B-Zahlungen**: Niedrige Latenz/Fees vs. Korrespondenzbanken. **24/7-Settlement**
      - **DeFi/IoT**: Automatisierte Mikrozahlungen via Smart Contracts.
      - **Inklusion**: **Bankkonto-Ersatz** in unterbankten Regionen; IoT-Automatisierung via Smart Contracts.
      - **Trading/DeFi** : Liquidität in AMMs, Yield Farming ohne Fiat-Umwege.
          
      Stablecoins entwickeln sich von Krypto-Nischen zu **reguliertem globalem Zahlungsinstrument** – mit traditionellen Finanzinstituten als neuen Schlüsselakteuren.
    extended_description_en: |-
      Euro-denominated stablecoins — particularly those issued under the MiCA e-money token regime — are gaining traction as settlement instruments among tier-1 fintechs and some corporates. The primary use case is cross-border
      B2B payments where SWIFT latency and correspondent banking fees are pain points.
      
      Currently approx. 90% of market capitalization are dominated by US-stablecoins - Coins Tether (USDT) and USD Coin (USDC). Their market value doubled within 2 years and is now at approx. 225 blln USD. Paypal is extending the 
      usability of its stablecoin PYUSD to other markets, including Europe. Mastercard recently acquierd a stablecoin expert BVNK.
      
      The already strong position of the US is expected to become even stronger. The proposed Genius Act legislation demands, that stablecoins are backed by liquid assets (e.g. USD) and shortterm US-government 
      bonds. This creates a steady demand for US-bonds and might make it interesting for companies to move to the US.
      
      There are also more concerned views on stablecoins. The Financial Action Task Force (FATF) fears an increase in illegal cross-country financial flows/transactions. International payment transactions are 
      only loosely regulated.ECB and BIS see a potential danger that stablecoins might have a destabilizing effect on the economy in emerging markets by driving out local currencies. 
      
      In the EU, a european banking consortium is driving the establishment of Qivalis (a MiCAR-compliant stablecoin issuer supervised by the Dutch central bank). The goal is to issue a regulated euro stablecoin. As of December 2025, 
      the consortium consists of 11 members. DZ Bank, Banca Sella, BNP Paribas, CaixaBank, Danske Bank, DekaBank, ING, xKBC, Raiffeisen Bank International, SEB, and UniCredit. Market entry is targeted for the second half of 2026.
      Integration for banks would require changes to their treasury management system, a new token custody model, and updated AML/CFT screening procedures for \non-chain transactions. The technology stack is mature (Ethereum L2, Polygon, 
      or private permissioned chains), but the regulatory treatment of stablecoin-settled transactions for capital and liquidity purposes is still being \ninterpreted. Our key differentiator could be a white-label stablecoin settlement corridor 
      offered to corporate clients.
    risks:
      - |-
        Regulatory uncertainty around MiCA implementation timelines and ECB guidance on bank stablecoin custody.
      - Liquidity and de-peg risk if the underlying stablecoin reserve management fails.
      - 'AML/CFT complexity: on-chain transactions require new screening tooling and staff
    training.'
      - Reputational risk if a partner bank or stablecoin issuer experiences a public
        failure during pilot.
    chances:
      - |-
        First-mover advantage in corporate cross-border settlement within the German cooperative banking sector.
      - 30–60% cost reduction on international payment corridors compared to SWIFT/correspondent
        model.
      - 'New revenue stream: white-label stablecoin settlement infrastructure sold to
    smaller regional banks.'
      - |-
        Positions the institution for a Digital Euro intermediary role given overlapping technical architecture.
