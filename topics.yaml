  - id: 1
    title: "Stablecoins"
    category: Regulatory
    score: 3
    priority: Low
    horizon: 36-60 months
    management_summary: |-
      Stablecoins gewinnen aktuell zunehmend an öffentlichem Interesse. Stablecoin-Zahlungssysteme bieten eine glaubwürdige mittelfristige Alternative für grenzüberschreitende Zahlungen und können die Kosten des Korrespondenzbankwesens potenziell um 30–60 % senken.
      Der MiCA-Rahmen bietet einen regulatorischen Weg in Europa, doch die Zeitpläne sind weiterhin ungewiss. Es besteht die Gefahr, dass Stablecoins andere Produkte, insbesondere im Zahlungsverkehr, verdrängen. Wir können Banken jedoch bei der Integration von Stablecoins 
      unterstützen, wenn wir uns frühzeitig positionieren. Wir empfehlen ein begrenztes Pilotprogramm unter genauer Beobachtung der EZB-Politik.
  
      Die USA treiben die Entwicklung voran und wollen ihre Position stärken. Die EZB wünscht sich eine durchdachte Regulierung. Banken erkennen die Chancen und die Bedeutung der Stablecoin-Technologie und fördern deren Weiterentwicklung (Qivalis).
    management_summary_en: |-
      Stablecoins are currently gaining more public interest. Stablecoin payment rails offer a credible medium-term alternative for cross-border settlement potentially reducing correspondent banking costs by 30–60%. 
      The MiCA framework provides a regulatory pathway in Europe but timelines remain uncertain. It should be noted, that there is a potential danger of stablecoins canibalizing other products including the payment sector. 
      However, supporting Banks in their stablecoin integration if we position ourselfes early on. We recommend a contained pilot programme while monitoring ECB policy closely. 
      
      US is driving further development and want to strengthen their position. ECB wants thought through regulation. Banks see the chances and significance of stablecoin technology and enforce further development (Qivalis).
    description: |-
      Stablecoins sind Kryptowährungen, deren Wert an stabile Vermögenswerte wie US-Dollar oder Euro gebunden ist, im Gegensatz zu volatilen Coins wie Bitcoin. Sie werden durch Reserven (Fiat, Staatsanleihen oder andere Assets) abgesichert und dienen als zuverlässig(er)es Zahlungsmittel im Krypto-Ökosystem.
    description_en: |-
      Stablecoins are cryptocurrencies whose value is pegged to stable assets such as the US dollar or euro, unlike volatile coins such as Bitcoin. They are backed by reserves (fiat currency, government bonds, or other assets) and serve as a more reliable means of payment within the crypto ecosystem.
    extended_description_en: |-
      Stablecoins are **blockchain-based means of payment** that are **pegged 1:1 to fiat currencies** (US dollar, euro) and/or backed by liquid assets (e.g., government bonds).
  
      Unlike volatile cryptocurrencies such as Bitcoin, they serve as a **stable bridge** within blockchains – ideal for parking capital without fiat conversion or for exploiting **arbitrage opportunities** between exchanges.
    
      ## Key Characteristics
      
      - **Price Stability**: Fiat-pegged stablecoins like USDT (Tether) or USDC make up **99% of the market**, with euro-linked versions (EURC) following at <1%.
      - **Primary Use**: Bridge in cryptocurrency trading (crypto → stablecoin → other crypto), without fiat conversion; basis for **DeFi** protocols (lending, DEX).   
      - **Advantages**: Seamless integration into **smart contracts** for automated payments, e.g., IoT devices; alternative to bank accounts in underbanked regions.
      
      ## Market and Growth Dynamics
      
      - **Market Dominance**: **Tether (USDT)** and **USD Coin (USDC)** control **~90%** of a market that has doubled in two years to **$225 billion** (BIS data). 
      - **European Market**: Still **early stage**, MiCA regulation (since 2024) creates a framework for e-money stablecoins; MiCA e-money tokens are gaining **B2B relevance** among fintechs/companies for **cross-border payments** (SWIFT alternative, **60% cost reduction**). Euro variants <1% market share.     
      - **Growth Drivers**: Cross-border payments (**cost reduction up to 60%** vs. traditional banks), **DeFi applications** (lending, DEX), and **smart contract payments** for IoT.
      
      ## Financial Services Engagement
       
       **Traditional players** are catching up: **PayPal** is expanding **PYUSD** (launched in the US in 2023) to **70 markets**, including Europe; **Mastercard** is acquiring **BVNK**, a stablecoin specialist.
        
      A European consortium (Qivalis, MiCAR-compliant under Dutch DNB supervision) with 11 banks (DZ Bank, BNP Paribas, ING, UniCredit, and others) plans to launch a Euro stablecoin in the second half of 2026. Overall, Europe is still in an early growth phase – MiCA regulation (since 2024) provides clarity for e-money stablecoins (1:1 reserves).
      
      ## Regulatory Framework
      
      - USA (Genius Act): The requirement for liquid US assets (dollars, Treasury bills) secures demand for government bonds and restricts issuers.
      - Europe (MiCA): Strength of 1:1 reserves, licensing requirement; **Qivalis** (a consortium including **DZ Bank, ING, UniCredit**, and others, regulated by the DNB) plans to launch a **Euro stablecoin** in the second half of 2026.
      - **Risks (FATF/ECB/BIS)**: The risk of illicit financial flows due to incomplete regulation; **currency displacement** in emerging markets destabilizes local economies.
      
      ## Implementation Requirements
        
      Banks need **treasury adjustments**, **token custody**, and **AML/CFT** for off-chain transactions.
      
      Tech Stack: **Ethereum L2** (polygon) or licensed chains; open questions regarding **capital/liquidity treatment**.
      
      **AUS**: A white-label **stablecoin settlement corridor** as a **USP** for corporate clients.
         
      ## Extended Use Cases
      
      - **B2B Payments**: Low latency/fees vs. correspondent banks. **24/7 processing**    
      - **DeFi/IoT**: Automated micropayments via smart contracts.     
      - **Inclusion**: **Bank account replacement** in emerging markets; IoT automation through smart contracts.      
      - **Trading/DeFi**: Liquidity in AMMs, yield farming without fiat currency intermediaries.
        
        Stablecoins are evolving from crypto niches to **regulated global payment instruments** – with traditional financial institutions as new key players.
    extended_description: |-
      Stablecoins sind **Blockchain-basierte Zahlungsmittel**, die **1:1 an Fiat-Währungen** (US-Dollar, Euro) gebunden und/oder durch liquide Vermögenswerte (z.B. Staatsanleihen) abgesichert sind. 
      Im Gegensatz zu volatilen Kryptowährungen wie Bitcoin dienen sie als **stabile Brücke** innerhalb von Blockchains – ideal zum Parken von Kapital ohne Fiat-Konvertierung oder zum Ausnutzen von **Arbitrage-Chancen** zwischen Börsen.
    
      ## Wesentliche Eigenschaften 
      
      - **Wertstabilität**: Fiat-gebundene Stablecoins wie USDT (Tether) oder USDC machen **99% des Marktes** aus, Euro-Varianten (EURC) folgen mit <1%.
      - **Primäre Nutzung**: Brücke im Kryptohandel (Krypto → Stablecoin → anderes Krypto), ohne Fiat-Konvertierung; Basis für **DeFi**-Protokolle (Lending, DEX).
      - **Vorteile**: Nahtlose Integration in **Smart Contracts** für automatisierte Zahlungen, z.B. IoT-Geräte; Alternative zu Bankkonten in unterbankten Regionen.
      
      ## Markt- und Wachstumsdynamik 
      
      - **Marktdominanz**: **Tether (USDT)** und **USD Coin (USDC)** kontrollieren **~90%** eines Marktes, der sich in zwei Jahren auf **$225 Mrd.** verdoppelt hat (BIZ-Daten).
      - **Europäischer Markt**: Noch **frühphasig**, MiCA-Regulierung (seit 2024) schafft Rahmen für eMoney-Stablecoins; MiCA-eMoney-Tokens gewinnen an **B2B-Relevanz** bei Fintechs/Unternehmen für **Cross-Border-Zahlungen** (SWIFT-Alternative, **60% Kostensenkung**). Euro-Varianten <1% Marktanteil.
      - **Wachstumstreiber**: Grenzüberschreitender Zahlungsverkehr (**Kostensenkung bis 60%** vs. traditionelle Banken), **DeFi-Anwendungen** (Lending, DEX) und **Smart-Contract-Zahlungen** für IoT.
      
      ## Finanzdienstleister-Engagement 
        
      **Traditionelle Player** drängen nach: **PayPal** expandiert **PYUSD** (seit 2023 USA) auf **70 Märkte** inkl. Europa; **Mastercard** übernimmt **BVNK** als Stablecoin-Spezialisten.
        
      Europäisches Konsortium (**Qivalis**, MiCAR-konform unter niederländischer DNB-Aufsicht) mit **11 Banken** (DZ Bank, BNP Paribas, ING, UniCredit u.a.) plant **Euro-Stablecoin**-Launch H2 2026. Insgesamt befindet sich Europa noch in einer **frühen Wachstumsphase** – MiCA-Regulierung (seit 2024) schafft
      Klarheit für **eMoney Stablecoins** (1:1-Reserven).
      
      ## Regulatorische Rahmenbedingungen 
      - **USA (Genius Act)**: Pflicht zur **liquiden US-Assets** (Dollar, T-Bills) sichert die Nachfrage nach Staatsanleihen und sperrt Emittenten.
      - **Europa (MiCA)**: Stärke 1:1-Reserven, Lizenzpflicht; **Qivalis** (Konsortium mit **DZ Bank, ING, UniCredit** u.a., DNB-reguliert) plant **Euro-Stablecoin** H2 2026.
      - **Risiken (FATF/EZB/BIZ)**: Gefahr illegaler Finanzströme durch lückenhafte Regulierung; **Währungsverdrängung** in Schwellenländern destabilisiert lokale Ökonomien.
      
      ## Implementierungsanforderungen 
        
      Banken brauchen **Treasury-Anpassungen**, **Token-Verwahrung**, **AML/CFT** für Off-Chain-Transaktionen.
      Tech-Stack: **Ethereum L2** (Polygon) oder lizenzierte Chains; offene Fragen zu **Kapital-/Liquiditätsbehandlung**.
      **AUS**: White-Label-**Stablecoin-Settlement-Korridor** als **USP** für Firmenkunden.
      
      ## Erweiterte Anwendungsfälle 
    
      - **B2B-Zahlungen**: Niedrige Latenz/Gebühren vs. Korrespondenzbanken. **24/7-Abwicklung**
      - **DeFi/IoT**: Automatisierte Mikrozahlungen über Smart Contracts.
      - **Inklusion**: **Bankkonto-Ersatz** in Schwellenlängern; IoT-Automatisierung durch Smart Contracts.
      - **Trading/DeFi** : Liquidität in AMMs, Yield Farming ohne Fiat-Umwege.
      
      Stablecoins entwickeln sich von Krypto-Nischen zu **reguliertem globalem Zahlungsinstrument** – mit traditionellen Finanzinstituten als neuen Schlüsselakteuren.
    risks:
      - |- 
        Regulatorische Unsicherheit bezüglich der Implementierungszeitpläne von MiCA und der EZB-Leitlinien zur Verwahrung von Stablecoins durch Banken.
      - Liquiditäts- und Abwertungsrisiko bei Ausfall des zugrunde liegenden Stablecoin-Reservemanagements.
      - Komplexität der Geldwäschebekämpfung und Terrorismusfinanzierungsbekämpfung: On-Chain-Transaktionen erfordern neue Screening-Tools und Mitarbeiterschulungen.
      - Reputationsrisiko bei einem öffentlichen Scheitern einer Partnerbank oder eines Stablecoin-Emittenten während der Pilotphase.
    chances:
      - |- 
        Wettbewerbsvorteil als Vorreiter im grenzüberschreitenden Firmenzahlungsverkehr innerhalb des deutschen Genossenschaftsbankensektors.
      - Kostenreduzierung von 30–60 % bei internationalen Zahlungskorridoren im Vergleich zum SWIFT/Korrespondenzbankenmodell.
      - Neue Einnahmequelle: Verkauf von White-Label-Stablecoin-Abwicklungsinfrastruktur an kleinere Regionalbanken.
      - |- 
        Positioniert das Institut aufgrund der sich überschneidenden technischen Architektur für eine Intermediärrolle im digitalen Euro.
    risks_en:
