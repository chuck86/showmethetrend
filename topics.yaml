- id: 7
  title: FIDA - Financial Data Access Regulation
  category: Banking Regulatory and Trends
  score: 2
  priority: Low-Medium
  horizon: 12–30 months
  description: |-
    The Financial Data Access (FIDA) regulation goes significantly beyond PSD2, mandating data sharing across savings,  investments, insurance, and pension products. Banks face both defensive obligations and offensive data product opportunities.
  management_summary:
    summary: |-
      FIDA represents the largest expansion of open banking obligations since PSD2. The compliance burden is real  but manageable if we treat it as an architecture investment rather than a point solution. The commercial upside — acting as a  data hub for the full customer financial profile — is substantial and should drive the product roadmap.
        TBD .
    strategic_importance: ''
    course_of_action: ''
  extended_description: |-
    FIDA (Financial Data Access Regulation) was proposed by the European Commission in June 2023 as part of the  retail financial services strategy. It mandates data sharing for savings accounts, investments, insurance, occupational pensions,  and mortgage data — all currently outside PSD2 scope. Financial data sharing schemes (FDSS) must be established by industry, with  a fallback regulatory standard if industry fails to agree. The permission framework introduces customer dashboard requirements:  customers must have a single interface to manage all data sharing consents across institutions. For banks, FIDA creates a dual role:  as a data holder (mandatory sharing obligations) and as a data user (ability to access customer data held at other institutions  for value-added services). The data user opportunity — aggregating a complete customer financial picture for advisory, lending,    and personalisation — is the primary commercial case.
  risks:
  - |-
    FIDA compliance requires significant API and consent management infrastructure investment across all product lines.
  - |-
    Competitive risk: FIDA enables fintechs and big tech to access our customer's complete financial profile at negligible marginal cost.
  - |-
    Data quality obligations under FIDA require ongoing governance of data accuracy across legacy systems.
  - |-
    FDSS governance negotiations may produce unfavourable technical standards that increase our compliance cost.
  chances:
  - |-
    FIDA data user rights enable us to aggregate a complete financial profile for each customer — the foundation for holistic advisory products.
  - |-
    FIDA-based lending decisioning (using competitor account and investment data) improves credit accuracy and opens new segments.
  - |-
    Early FDSS participation shapes technical standards in our favour and builds relationships with key data ecosystem partners.
  - |-
    Consent dashboard requirement, if implemented well, becomes a customer engagement and upsell touchpoint.
