      - description: Map current digital onboarding and e-signature workflows against
          eIDAS 2.0 trust level requirements.
        status: open
      - description: |-
          Evaluate qualifying as a Trust Service Provider (TSP) under the updated framework and assess commercial viability.
        status: open
      - description: Integrate eIDAS 2.0-compliant identity verification into the customer
          portal authentication layer.
        status: open
      - description: Engage national supervisory body (BSI / BNetzA) on implementation
          timelines and technical standards.
        status: open
