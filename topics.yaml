- id: 13
  title: Request to Pay
  category: Digital Payments
  score: 6
  priority: Medium
  horizon: 3-12 months
  management_summary:
    summary: "## Aktueller Stand\n\nRequest to Pay (RTP) ist seit 2021 als SEPA-Nachrichtenformat\
      \ des European Payments Council (EPC) standardisiert; das aktuelle SRTP Rulebook\
      \ v4.0 ist seit Oktober 2025 in Kraft. Im giroAPI-Ökosystem ist das RTP Sub-Scheme\
      \ für 2026 geplant – ein konkretes Fertigstellungsdatum kann derzeit nicht genannt\
      \ werden, da das giroAPI Scheme als fortlaufender Entwicklungsprozess verstanden\
      \ wird. In Deutschland pilotieren Ende 2025 die Bayerische Landesbank, die DZ\
      \ Bank mit der genossenschaftlichen Gruppe, die Deutsche Bank sowie die Postbank\
      \ den Einsatz der RTP-Plattform PAYCY als Dienstleistung für E-Rechnungen ihrer\
      \ Firmenkunden. Der entscheidende regulatorische Treiber ist die deutsche E-Rechnungspflicht:\
      \ Seit dem 1. Januar 2025 müssen alle Unternehmen in Deutschland in der Lage\
      \ sein, E-Rechnungen zu empfangen; die Ausstellungspflicht wird bis 2028 stufenweise\
      \ ausgeweitet. \n\n## Strategische Bedeutung\nRequest to Pay schlägt die Brücke\
      \ zwischen Rechnungsstellung und Zahlung – und löst damit einen der letzten\
      \ verbleibenden Medienbrüche im digitalen Zahlungsverkehr. Banken haben jetzt\
      \ noch die Möglichkeit, sich als Postbox für elektronische Rechnungen zu positionieren\
      \ und diesen Markt zu besetzen – mit konkretem Erlöspotenzial auf der Unternehmensseite.\
      \ Die Kombination aus E-Rechnungspflicht, Instant Payment Regulation und dem\
      \ giroAPI RTP Sub-Scheme 2026 schafft ein günstiges Fenster für eine marktgetriebene\
      \ Adoption, das Banken als IT-Dienstleister aktiv gestalten können. \n\n## Handlungsempfehlungen\n\
      - Frühzeitige Vorbereitung auf den Beitritt zum giroAPI RTP Sub-Scheme 2026\n\
      - Positionierung der Bank als digitale Rechnungspostbox für Firmenkunden – Verknüpfung\
      \ mit bestehenden E-Banking- und EBICS-Infrastrukturen\n- Evaluierung einer\
      \ Plattformlösung (z.B. RTP-as-a-Service) zur effizienten Markteinführung ohne\
      \ vollständig eigenständigen Infrastrukturaufbau\n- Aktive Begleitung der Firmenkunden\
      \ bei der E-Rechnungspflicht als strategischer Einstiegspunkt für RTP-Adoption"
    strategic_importance: ''
    course_of_action: ''
